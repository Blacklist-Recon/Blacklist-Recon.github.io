<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blacklist Recon Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 1200px; height: 480px; overflow: hidden; }

  .banner {
    width: 1200px;
    height: 480px;
    background: #080a0a;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
  }

  /* Animated background grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(224,79,79,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(224,79,79,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridShift 15s linear infinite;
  }
  @keyframes gridShift {
    0% { transform: translate(0,0); }
    100% { transform: translate(48px, 48px); }
  }

  /* Red glow blobs */
  .glow1 {
    position: absolute;
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(139,26,26,0.35) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: pulse1 4s ease-in-out infinite;
  }
  .glow2 {
    position: absolute;
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(139,26,26,0.2) 0%, transparent 70%);
    bottom: -80px; right: 200px;
    animation: pulse2 6s ease-in-out infinite;
  }
  @keyframes pulse1 { 0%,100%{opacity:.6} 50%{opacity:1} }
  @keyframes pulse2 { 0%,100%{opacity:.4} 50%{opacity:.8} }

  /* Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* Big skull */
  .skull-main {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 280px;
    line-height: 1;
    opacity: 0.06;
    filter: blur(2px);
    animation: skullPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes skullPulse {
    0%,100% { opacity: 0.06; transform: translateY(-50%) scale(1); }
    50% { opacity: 0.1; transform: translateY(-50%) scale(1.03); }
  }

  /* Crossbones decorative */
  .crossbones {
    position: absolute;
    font-size: 48px;
    opacity: 0.08;
    animation: floatAround 8s ease-in-out infinite;
  }
  .crossbones:nth-child(1) { top: 20px; left: 20px; animation-delay: 0s; font-size: 32px; }
  .crossbones:nth-child(2) { top: 30px; right: 320px; animation-delay: 1s; font-size: 24px; }
  .crossbones:nth-child(3) { bottom: 20px; left: 200px; animation-delay: 2s; font-size: 28px; }
  .crossbones:nth-child(4) { bottom: 40px; right: 400px; animation-delay: 3s; font-size: 20px; }
  @keyframes floatAround {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    33% { transform: translate(4px,-6px) rotate(5deg); }
    66% { transform: translate(-4px,4px) rotate(-3deg); }
  }

  /* Left content */
  .left { position: relative; z-index: 2; }

  .eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: #8b1a1a;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: '';
    width: 24px; height: 1px;
    background: #8b1a1a;
  }

  .brand {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 0.9;
    color: #f5dada;
    text-shadow: 0 0 80px rgba(224,79,79,0.4);
    margin-bottom: 6px;
    letter-spacing: -1px;
  }
  .brand span {
    display: block;
    color: #e04f4f;
    font-size: 0.45em;
    letter-spacing: 14px;
    text-shadow: 0 0 40px rgba(224,79,79,0.7);
  }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: #5a3030;
    letter-spacing: 2px;
    margin-top: 20px;
    text-transform: uppercase;
  }

  /* Divider */
  .vdivider {
    width: 1px;
    height: 240px;
    background: linear-gradient(to bottom, transparent, #2e1f1f, transparent);
    position: relative;
    z-index: 2;
    margin: 0 60px;
    flex-shrink: 0;
  }

  /* Right — counter */
  .right {
    position: relative;
    z-index: 2;
    text-align: center;
    flex-shrink: 0;
  }

  .counter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: #5a3030;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .counter-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 96px;
    line-height: 1;
    color: #e04f4f;
    text-shadow: 0 0 50px rgba(224,79,79,0.6);
    margin-bottom: 4px;
    transition: all 0.4s;
  }
  .counter-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #8b1a1a;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .live-dot {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #e04f4f;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #5a3030;
    text-transform: uppercase;
  }

  .url {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #3a1a1a;
    text-transform: uppercase;
    border-top: 1px solid #1a0a0a;
    padding-top: 14px;
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: #2e1f1f;
    border-style: solid;
    z-index: 3;
  }
  .corner.tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

  /* Top/bottom border lines */
  .border-top, .border-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, #2e1f1f 20%, #2e1f1f 80%, transparent);
    z-index: 3;
  }
  .border-top { top: 0; }
  .border-bottom { bottom: 0; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="scanlines"></div>
  <div class="skull-main">☠</div>
  <div class="crossbones">☠</div>
  <div class="crossbones">✝</div>
  <div class="crossbones">☠</div>
  <div class="crossbones">✝</div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="border-top"></div>
  <div class="border-bottom"></div>

  <div class="left">
    <div class="eyebrow">Torn City · Contract Network</div>
    <div class="brand">
      Blacklist
      <span>Recon</span>
    </div>
    <div class="tagline">We find them. You finish them.</div>
  </div>

  <div class="vdivider"></div>

  <div class="right">
    <div class="counter-label">Contracts Fulfilled</div>
    <div class="counter-num" id="count">—</div>
    <div class="counter-sub">Total Completed</div>
    <div class="live-dot">
      <div class="dot"></div>
      <div class="live-text">Live · Updates Every 30s</div>
    </div>
    <div class="url">blacklist-recon.github.io</div>
  </div>
</div>

<script>
async function fetchCount() {
  try {
    const res  = await fetch('https://torn-bounty-board.pearcej29.workers.dev/stats');
    const data = await res.json();
    const el   = document.getElementById('count');
    el.textContent = String(data.completedBounties ?? 0).padStart(3, '0');
  } catch(e) {}
}
fetchCount();
setInterval(fetchCount, 30000);
</script>
</body>
</html>
