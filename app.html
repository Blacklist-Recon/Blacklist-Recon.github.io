<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blacklist HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #080a0a;
    --ash: #0c0a0a;
    --obsidian: #120d0d;
    --slate: #1a1010;
    --border: #2e1f1f;
    --muted: #4a2020;
    --dim: #7d5252;
    --text: #e6c8c8;
    --bright: #f5dada;
    --blood: #8b1a1a;
    --crimson: #c0392b;
    --ember: #e04f4f;
    --gold: #c9a84c;
    --gold-dim: #7a5f28;
    --green: #5fe04f;
    --amber: #e0a14f;
    --blue: #4f9ce0;
    --purple: #c14fe0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── SCANLINES ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(139,26,26,0.1) 0%, transparent 70%);
  }
  .login-skull { font-size: 48px; margin-bottom: 16px; }
  .login-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .login-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--ash);
    border: 1px solid var(--border);
    padding: 28px;
  }
  .login-box label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .login-box input {
    width: 100%;
    background: var(--void);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    margin-bottom: 16px;
    outline: none;
  }
  .login-box input:focus { border-color: var(--ember); }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--blood);
    border: 1px solid var(--crimson);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--crimson); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .login-error {
    color: var(--ember);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    margin-top: 12px;
    text-align: center;
  }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: rgba(8,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--ember);
    text-transform: uppercase;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .agent-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .agent-badge span { color: var(--ember); }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-logout:hover { color: var(--ember); border-color: var(--ember); }

  /* ── BOTTOM NAV (mobile) ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: rgba(8,10,10,0.97);
    border-top: 1px solid var(--border);
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    gap: 4px;
    border: none;
    background: none;
    transition: color 0.15s;
  }
  .nav-item .nav-icon { font-size: 18px; line-height: 1; }
  .nav-item.active { color: var(--ember); }
  .nav-item:hover { color: var(--text); }

  /* ── DESKTOP SIDEBAR ── */
  .desktop-layout {
    display: flex;
    flex: 1;
    padding-bottom: 60px;
  }
  @media (min-width: 768px) {
    .bottom-nav { display: none; }
    .desktop-layout { padding-bottom: 0; }
    .sidebar {
      display: flex !important;
      flex-direction: column;
      width: 200px;
      min-width: 200px;
      border-right: 1px solid var(--border);
      padding: 20px 0;
      background: var(--ash);
      position: sticky;
      top: 53px;
      height: calc(100vh - 53px);
      overflow-y: auto;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .sidebar-item .nav-icon { font-size: 16px; }
    .sidebar-item.active { color: var(--ember); background: rgba(139,26,26,0.15); border-left: 2px solid var(--ember); }
    .sidebar-item:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }
  }
  .sidebar { display: none; }

  /* ── MAIN CONTENT ── */
  .main-content {
    flex: 1;
    padding: 20px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .page-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--blood);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--bright);
    letter-spacing: 1px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .card-row:last-child { margin-bottom: 0; }
  .card-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .card-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--bright);
    text-align: right;
    word-break: break-word;
  }

  /* ── STATUS BADGES ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .badge-requested      { background: #3a3320; color: #e0c84f; }
  .badge-payment_pending { background: #3a2c20; color: #e0a14f; }
  .badge-listed         { background: #1a2030; color: #4f9ce0; }
  .badge-approved       { background: #1a2030; color: #4f9ce0; }
  .badge-claimed        { background: #2c2038; color: #c14fe0; }
  .badge-completed           { background: #1f2e1f; color: #5fe04f; }
  .badge-pending_verification { background: #2c1f38; color: #c084fc; border: 1px solid #6b21a8; }

  /* ── BUTTONS ── */
  .btn {
    background: var(--slate);
    border: 1px solid var(--muted);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--blood); border-color: var(--ember); color: var(--bright); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-green { background: #0a200a; border-color: #204a20; color: #9ae89a; }
  .btn-green:hover { background: #102e10; border-color: #2d6a2d; }
  .btn-red { background: #200a0a; border-color: #4a2020; color: #e89a9a; }
  .btn-red:hover { background: #2e1010; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .form-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--void);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--ember); }
  select option { background: var(--ash); }

  /* ── STATS GRID ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--ember);
    text-shadow: 0 0 20px rgba(224,79,79,0.3);
    margin-bottom: 4px;
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── EMPTY / ERROR / SUCCESS ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .msg-error {
    background: rgba(139,26,26,0.15);
    border: 1px solid var(--blood);
    color: var(--ember);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .msg-success {
    background: rgba(31,46,31,0.5);
    border: 1px solid #204a20;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .loading {
    text-align: center;
    padding: 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── SECTION HEAD ── */
  .section-head {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--blood);
    text-transform: uppercase;
    margin: 24px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--ember); color: var(--ember); background: rgba(139,26,26,0.15); }
  .filter-btn:hover:not(.active) { border-color: var(--dim); color: var(--text); }

  /* ── ROSTER TABLE ── */
  .roster-table { width: 100%; border-collapse: collapse; }
  .roster-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .roster-table td {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text);
    padding: 10px 12px;
    border-bottom: 1px solid rgba(46,31,31,0.4);
  }
  .roster-table tr:hover td { background: rgba(139,26,26,0.05); }

  /* ── BALANCE BIG ── */
  .balance-hero {
    text-align: center;
    padding: 28px;
    background: var(--obsidian);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    position: relative;
  }
  .balance-hero::before, .balance-hero::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--ember);
    border-style: solid;
  }
  .balance-hero::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .balance-hero::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .balance-amount {
    font-family: 'Share Tech Mono', monospace;
    font-size: 42px;
    color: var(--ember);
    text-shadow: 0 0 30px rgba(224,79,79,0.4);
    margin-bottom: 4px;
  }
  .balance-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .balance-agent {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--blood);
    letter-spacing: 2px;
    margin-top: 8px;
  }

  /* ── HIST ROWS ── */
  .hist-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(46,31,31,0.4);
    gap: 12px;
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-target { font-size: 13px; color: var(--bright); }
  .hist-date { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); }
  .hist-amount { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--green); white-space: nowrap; }

  /* ── PROOF INPUT ── */
  .proof-input-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 10px; }
  .proof-input-row input { flex: 1; margin: 0; }

  @media (max-width: 767px) {
    .main-content { padding: 16px; }
    .card-row { flex-direction: column; align-items: flex-start; gap: 2px; }
    .card-value { text-align: left; }
  }

  /* ── RANK BADGES ── */
  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 10px 2px 6px;
    border-radius: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    white-space: nowrap;
  }
  .rank-badge .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .badge-ghost       { background: #1a2332; color: #6a7f94; border: 1px solid #2a3a4a; }
  .badge-blade       { background: #1a2030; color: #4f9ce0; border: 1px solid #2a3050; }
  .badge-phantom     { background: #2c1f38; color: #c084fc; border: 1px solid #3c2f48; }
  .badge-reaper      { background: #2e1010; color: #e74c3c; border: 1px solid #4e2020; }
  .badge-wraith      { background: #1a1a2a; color: #c8d8e8; border: 1px solid #2a2a3a; }
  .badge-shadow_hand { background: #2a1e08; color: #c9a84c; border: 1px solid #4a3018; }
  .badge-admin       { background: linear-gradient(90deg,#2a1008,#1a1808); color: #c9a84c; border: 1px solid #8b1a1a; }
  .badge-lister      { background: #2a1e08; color: #e0a14f; border: 1px solid #4a3010; }
  .badge-verifier    { background: #0a2028; color: #22b8cc; border: 1px solid #0a4050; }
  .badge-probation   { background: #3a3010; color: #e0c84f; border: 1px solid #5a4010; }

  .rank-progress {
    margin-top: 8px;
    background: var(--void);
    border: 1px solid var(--border);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }
  .rank-progress-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* ── MESSAGES ── */
  .msg-badge {
    display: inline-block;
    background: var(--ember);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
    animation: pulse-badge 2s ease-in-out infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .inbox-card {
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .inbox-card.unread { border-left: 3px solid var(--ember); }
  .inbox-card.read   { opacity: 0.7; }
  .inbox-subject {
    font-size: 15px;
    font-weight: 600;
    color: var(--bright);
    margin-bottom: 6px;
  }
  .inbox-message {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .inbox-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .inbox-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .inbox-note {
    background: rgba(139,26,26,0.1);
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
  }

  /* ── CHAT ── */
  .chat-window {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px);
    min-height: 400px;
    background: var(--obsidian);
    border: 1px solid var(--border);
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 85%;
  }
  .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
  .chat-msg.theirs { align-self: flex-start; align-items: flex-start; }
  .chat-bubble {
    padding: 8px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .chat-msg.mine .chat-bubble {
    background: var(--blood);
    border: 1px solid var(--crimson);
    color: var(--bright);
    border-radius: 8px 8px 0 8px;
  }
  .chat-msg.theirs .chat-bubble {
    background: var(--slate);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px 8px 8px 0;
  }
  .chat-msg.admin-msg .chat-bubble {
    background: rgba(139,26,26,0.3);
    border-color: var(--ember);
  }
  .chat-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    padding: 0 4px;
  }
  .chat-sender { color: var(--ember); }
  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
    background: var(--ash);
  }
  .chat-input-row input {
    flex: 1;
    margin: 0;
    background: var(--void);
  }
  .chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
</style>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☠</text></svg>">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-skull">☠</div>
  <div class="login-title">Blacklist HQ</div>
  <div class="login-sub">Blacklist Recon · Command Center</div>
  <div class="login-box">
    <label>Torn API Key</label>
    <input type="password" id="api-key-input" placeholder="Paste your Torn API key" autocomplete="off" />
    <button class="btn-primary" id="login-btn">Authenticate</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">☠ Blacklist HQ</div>
    <div class="topbar-right">
      <div class="agent-badge" id="agent-badge"></div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </div>

  <div class="desktop-layout">
    <!-- Sidebar (desktop) -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="loading">Loading...</div>
    </main>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
const WORKER_URL = 'https://torn-bounty-board.pearcej29.workers.dev';
const PRICE_UNIT = 1_000_000;
const HUNTER_CUT = 0.75;
const ADMIN_CUT  = 0.25;

let apiKey   = localStorage.getItem('blhq_api_key') || '';
let identity = null;
let bounties = [];
let tiers    = {};
let currentPage = 'board';
let filterStatus = 'all';

function fmt(n)  { return '$' + Math.round(n).toLocaleString(); }

// Badge helpers
function rankBadge(rankId, rankName, onProbation) {
  const probTag = onProbation
    ? '<span class="rank-badge badge-probation" style="margin-left:4px;"><span class="badge-dot" style="background:#e0c84f"></span>Probation</span>'
    : '';
  const cls = 'badge-' + (rankId || 'ghost');
  const dotColors = {
    ghost:'#6a7f94', blade:'#4f9ce0', phantom:'#c084fc',
    reaper:'#e74c3c', wraith:'#c8d8e8', shadow_hand:'#c9a84c'
  };
  const dot = dotColors[rankId] || '#6a7f94';
  return `<span class="rank-badge ${cls}"><span class="badge-dot" style="background:${dot}"></span>${rankName}</span>${probTag}`;
}

function roleBadge(role) {
  const map = {
    admin:    {cls:'badge-admin',    name:'The Handler', dot:'#c9a84c'},
    lister:   {cls:'badge-lister',   name:'Lister',      dot:'#e0a14f'},
    verifier: {cls:'badge-verifier', name:'Verifier',    dot:'#22b8cc'},
  };
  const b = map[role];
  if (!b) return '';
  return `<span class="rank-badge ${b.cls}"><span class="badge-dot" style="background:${b.dot}"></span>${b.name}</span>`;
}
function formatDeadline(ts) {
  const diff = ts - Date.now();
  if (diff <= 0) return 'EXPIRED';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m remaining` : `${m}m remaining`;
}
function hunterPay(p) { return Math.round(p * PRICE_UNIT * HUNTER_CUT); }
function adminPay(p)  { return Math.round(p * PRICE_UNIT * ADMIN_CUT);  }
function esc(s)  { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }
function statusBadge(s) { return `<span class="badge badge-${s}">${s.replace('_',' ')}</span>`; }
function priceFor(price, role) {
  return (role === 'admin' || role === 'lister') ? fmt(price * PRICE_UNIT) : fmt(hunterPay(price));
}

// ── API ───────────────────────────────────────────────────────────────────
async function api(path, body = {}) {
  const res = await fetch(WORKER_URL + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey, ...body }),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Unknown error');
  return data;
}

// ── AUTH ──────────────────────────────────────────────────────────────────
async function login() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Authenticating...';
  errEl.textContent = '';
  try {
    apiKey = key;
    const res = await api('/whoami');
    identity = { tornId: res.tornId, name: res.name, role: res.role };
    localStorage.setItem('blhq_api_key', apiKey);
    await loadBounties();
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Authenticate';
  }
}

function logout() {
  apiKey = '';
  identity = null;
  localStorage.removeItem('blhq_api_key');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('api-key-input').value = '';
}

async function loadBounties() {
  const res = await api('/bounties/list');
  bounties = res.bounties;
  tiers    = res.tiers;
}

// ── APP SHELL ─────────────────────────────────────────────────────────────
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  const badge = document.getElementById('agent-badge');
  try {
    const aliasRes = await api('/alias/get');
    const displayName = aliasRes.alias || identity.name;
    if (identity.role === 'hunter') {
      // Get rank info
      try {
        const balRes = await api('/balance/get');
        const ri = balRes.rankInfo;
        if (ri) {
          badge.innerHTML = `<span style="color:var(--text);margin-right:8px;">${esc(displayName)}</span>${rankBadge(ri.rank.id, ri.rank.name, ri.onProbation)}`;
        } else {
          badge.innerHTML = `<span>${esc(displayName)}</span>`;
        }
      } catch(e) {
        badge.innerHTML = `<span>${esc(displayName)}</span>`;
      }
    } else {
      badge.innerHTML = `<span style="color:var(--text);margin-right:8px;">${esc(displayName)}</span>${roleBadge(identity.role)}`;
    }
  } catch(e) {
    badge.innerHTML = `<span>${esc(identity.name)}</span>`;
  }

  buildNav();
  navigate('board');

  // Poll every 30s for bounties + unread count
  let lastUnread = 0;
  async function pollUnread() {
    if (identity.role !== 'admin' && identity.role !== 'lister') return;
    try {
      const res = await api('/messages/unread');
      const count = res.unread || 0;
      // Update nav badge
      updateUnreadBadge(count);
      // Notify if new messages came in
      if (count > lastUnread && lastUnread !== -1) {
        showNotification(`📨 ${count} unread message${count > 1 ? 's' : ''} in Blacklist HQ`);
      }
      lastUnread = count;
    } catch(e) {}
  }
  function updateUnreadBadge(count) {
    document.querySelectorAll('[data-page="messages"]').forEach(el => {
      const existing = el.querySelector('.msg-badge');
      if (existing) existing.remove();
      if (count > 0) {
        const badge = document.createElement('span');
        badge.className = 'msg-badge';
        badge.textContent = count;
        el.appendChild(badge);
      }
    });
  }
  function showNotification(text) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Blacklist HQ', { body: text, icon: '/favicon.ico' });
    }
  }
  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  pollUnread();
  setInterval(async () => {
    await loadBounties();
    await pollUnread();
    if (currentPage === 'board') renderPage();
  }, 30000);
}

function navItems() {
  const items = [
    { id: 'board',   icon: '🎯', label: 'Board'   },
    { id: 'balance', icon: '💰', label: 'Balance'  },
  ];
  if (identity.role === 'admin' || identity.role === 'lister') {
    items.splice(1, 0, { id: 'new',    icon: '➕', label: 'New'    });
    items.splice(2, 0, { id: 'review', icon: '📋', label: 'Review' });
  }
  items.push({ id: 'chat', icon: '💬', label: 'Chat' });
  if (identity.role === 'admin' || identity.role === 'lister') {
    items.push({ id: 'messages', icon: '📨', label: 'Messages' });
  }
  if (identity.role === 'admin') {
    items.push({ id: 'reviews', icon: '⭐', label: 'Reviews' });
    items.push({ id: 'roster',  icon: '👥', label: 'Roster'  });
    items.push({ id: 'admin',   icon: '⚙️', label: 'Admin'   });
  }
  return items;
}

function buildNav() {
  const items = navItems();
  const sidebar = document.getElementById('sidebar');
  const bottomNav = document.getElementById('bottom-nav');

  sidebar.innerHTML = items.map(i => `
    <button class="sidebar-item ${currentPage === i.id ? 'active' : ''}" data-page="${i.id}">
      <span class="nav-icon">${i.icon}</span>${i.label}
    </button>
  `).join('');

  bottomNav.innerHTML = items.map(i => `
    <button class="nav-item ${currentPage === i.id ? 'active' : ''}" data-page="${i.id}">
      <span class="nav-icon">${i.icon}</span>${i.label}
    </button>
  `).join('');

  sidebar.querySelectorAll('[data-page]').forEach(el =>
    el.addEventListener('click', () => navigate(el.dataset.page)));
  bottomNav.querySelectorAll('[data-page]').forEach(el =>
    el.addEventListener('click', () => navigate(el.dataset.page)));
}

function navigate(page) {
  currentPage = page;
  filterStatus = 'all';
  buildNav();
  renderPage();
  window.scrollTo(0, 0);
}

function renderPage() {
  const main = document.getElementById('main-content');
  if (currentPage === 'board')   renderBoard(main);
  if (currentPage === 'new')     renderNew(main);
  if (currentPage === 'review')  renderReview(main);
  if (currentPage === 'balance') renderBalance(main);
  if (currentPage === 'chat')    renderChat(main);
  if (currentPage === 'messages') renderMessages(main);
  if (currentPage === 'reviews') renderReviews(main);
  if (currentPage === 'roster')  renderRoster(main);
  if (currentPage === 'admin')   renderAdmin(main);
}

// ── BOARD ─────────────────────────────────────────────────────────────────
function renderBoard(main) {
  const isPriv = identity.role === 'admin' || identity.role === 'lister';
  const allStatuses = isPriv
    ? ['all','requested','payment_pending','listed','claimed','completed']
    : ['all','listed','claimed','completed'];

  let filtered = bounties.filter(b => filterStatus === 'all' || b.status === filterStatus);

  const filterBtns = allStatuses.map(s => `
    <button class="filter-btn ${filterStatus === s ? 'active' : ''}" data-filter="${s}">
      ${s === 'all' ? 'All' : s.replace('_',' ')}
    </button>
  `).join('');

  const cards = filtered.length === 0
    ? `<div class="empty">No bounties match this filter</div>`
    : filtered.map(b => {
        const target = b.targetName
          ? esc(b.targetName) + (b.targetXid ? ` [${esc(b.targetXid)}]` : '')
          : esc(b.targetLabel || 'Hidden');
        const poster = b.posterLabel ? esc(b.posterLabel) : '—';
        const claimed = b.claimedByName ? esc(b.claimedByName) : '—';
        const priceLabel = (identity.role === 'admin' || identity.role === 'lister') ? 'Price' : 'Payout (75%)';

        let actions = '';
        if (b.status === 'listed' && (identity.role === 'hunter' || identity.role === 'admin')) {
          actions += `<button class="btn btn-red" data-action="claim" data-id="${b.id}">Claim</button>`;
        }
        if (b.status === 'claimed' && (identity.role === 'verifier' || identity.role === 'admin')) {
          actions += `<button class="btn btn-green" data-action="complete" data-id="${b.id}">Mark Complete</button>`;
        }

        return `
          <div class="card">
            <div class="card-row">
              <span class="card-label">Target</span>
              <span class="card-value">${target}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Tier</span>
              <span class="card-value">
                ${esc(b.tierLabel)}
                ${b.tier === 'high_value' ? '<span style="font-family:Share Tech Mono,monospace;font-size:9px;color:var(--ember);letter-spacing:1px;margin-left:6px;">★ PRIORITY</span>' : ''}
              </span>
            </div>
            <div class="card-row">
              <span class="card-label">${priceLabel}</span>
              <span class="card-value">${priceFor(b.price, identity.role)}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Client</span>
              <span class="card-value">${poster}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Status</span>
              <span class="card-value">${statusBadge(b.status)}</span>
            </div>
            ${b.claimedByName ? `<div class="card-row"><span class="card-label">Agent</span><span class="card-value">${claimed}</span></div>` : ''}
            ${b.notes ? `<div class="card-row"><span class="card-label">Notes</span><span class="card-value">${esc(b.notes)}</span></div>` : ''}
            ${identity.role === 'admin' ? `<div class="btn-row"><button class="btn" style="color:var(--dim);font-size:10px;" data-action="delete" data-id="${b.id}">🗑 Delete</button></div>` : ''}
            ${actions ? `<div class="btn-row">${actions}</div>` : ''}
          </div>
        `;
      }).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">🎯 Target Board</div>
    </div>
    <div class="stats-grid" id="board-stats-grid">
      <div class="stat-card">
        <div class="stat-value">${bounties.filter(b=>b.status==='listed').length}</div>
        <div class="stat-label">Open</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${bounties.filter(b=>b.status==='claimed'||b.status==='pending_verification').length}</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${bounties.filter(b=>b.status==='completed').length}</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card" id="member-count-card">
        <div class="stat-value" id="app-member-count">—</div>
        <div class="stat-label">Agents</div>
      </div>
    </div>
    <div class="filter-bar">${filterBtns}</div>
    ${cards}
  `;

  // Load live member count
  api('/stats').then(res => {
    const el = main.querySelector('#app-member-count');
    if (el) el.textContent = res.memberCount ?? '—';
  }).catch(() => {});

  main.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => { filterStatus = btn.dataset.filter; renderBoard(main); }));

  main.querySelectorAll('[data-action]').forEach(btn =>
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const id     = btn.dataset.id;
      if (action === 'delete') {
        if (!confirm('Delete this bounty? If completed, payouts will be reversed.')) return;
      }
      btn.disabled = true;
      try {
        if (action === 'claim')    await api('/bounties/claim',    { bountyId: id });
        if (action === 'complete') await api('/bounties/complete', { bountyId: id });
        if (action === 'delete')   await api('/bounties/delete',   { bountyId: id });
        if (action === 'submit-proof') {
          const input = main.querySelector(`.proof-link-input[data-id="${id}"]`);
          const proof = input ? input.value.trim() : '';
          if (!proof) { alert('Please paste your attack log URL first.'); btn.disabled = false; return; }
          await api('/bounties/complete', { bountyId: id, proofLink: proof });
        }
        await loadBounties();
        renderBoard(main);
      } catch (e) {
        btn.disabled = false;
        alert(e.message);
      }
    }));
}

// ── NEW BOUNTY ────────────────────────────────────────────────────────────
function renderNew(main) {
  const tierOptions = Object.entries(tiers).map(([key, t]) => {
    const note = key === 'standard' ? '$1,000,000 fixed'
      : key === 'war_support'       ? '$3.5M – $5M'
      : 'From $3M (evaluated)';
    return `<option value="${key}">${esc(t.label)} — ${note}</option>`;
  }).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">➕ New Contract</div>
    </div>
    <div id="new-msg"></div>
    <div class="form-group">
      <label class="form-label">Target Name</label>
      <input id="n-name" type="text" placeholder="Player name in Torn" />
    </div>
    <div class="form-group">
      <label class="form-label">Target XID (optional)</label>
      <input id="n-xid" type="text" placeholder="e.g. 1234567" />
    </div>
    <div class="form-group">
      <label class="form-label">Tier</label>
      <select id="n-tier">${tierOptions}</select>
      <div class="form-hint" id="n-tier-hint"></div>
    </div>
    <div class="form-group" id="n-price-group">
      <label class="form-label">Price ($ millions)</label>
      <input id="n-price" type="number" min="1" step="0.5" placeholder="e.g. 3.5" />
      <div class="form-hint" id="n-price-hint"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes / Hit Count</label>
      <textarea id="n-notes" rows="3" placeholder="Number of hits, any context..."></textarea>
    </div>
    <button class="btn btn-red" id="n-submit" style="width:100%;padding:12px;">Submit Contract Request</button>
  `;

  const tierSel    = main.querySelector('#n-tier');
  const priceGroup = main.querySelector('#n-price-group');
  const tierHint   = main.querySelector('#n-tier-hint');
  const priceHint  = main.querySelector('#n-price-hint');
  const priceInput = main.querySelector('#n-price');

  function updateTier() {
    const key = tierSel.value;
    if (key === 'standard') {
      priceGroup.style.display = 'none';
      tierHint.textContent = 'Fixed price: $1,000,000. No override needed.';
    } else if (key === 'war_support') {
      priceGroup.style.display = 'block';
      priceInput.min = '3.5'; priceInput.max = '5'; priceInput.step = '0.5';
      priceInput.placeholder = '3.5 to 5';
      tierHint.textContent = 'Range: $3,500,000 – $5,000,000.';
      priceHint.textContent = 'Enter 3.5, 4, 4.5, or 5';
    } else {
      priceGroup.style.display = 'block';
      priceInput.min = '3'; priceInput.max = ''; priceInput.step = '0.5';
      priceInput.placeholder = 'Minimum 3';
      tierHint.textContent = 'Starts at $3M. Admin will confirm price before listing.';
      priceHint.textContent = 'Enter a number (millions)';
    }
  }
  tierSel.addEventListener('change', updateTier);
  updateTier();

  main.querySelector('#n-submit').addEventListener('click', async () => {
    const name     = main.querySelector('#n-name').value.trim();
    const xid      = main.querySelector('#n-xid').value.trim();
    const tier     = tierSel.value;
    const priceRaw = priceInput.value.trim();
    const notes    = main.querySelector('#n-notes').value.trim();
    const msgEl    = main.querySelector('#new-msg');
    msgEl.innerHTML = '';

    if (!name) { msgEl.innerHTML = `<div class="msg-error">Target name is required.</div>`; return; }

    const btn = main.querySelector('#n-submit');
    btn.disabled = true;
    try {
      await api('/bounties/create', {
        targetName: name, targetXid: xid, tier,
        price: tier === 'standard' ? 1 : (priceRaw ? parseFloat(priceRaw) : undefined),
        notes,
      });
      await loadBounties();
      msgEl.innerHTML = `<div class="msg-success">Contract submitted successfully.</div>`;
      main.querySelector('#n-name').value = '';
      main.querySelector('#n-xid').value  = '';
      main.querySelector('#n-notes').value = '';
      priceInput.value = '';
    } catch (e) {
      msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
    }
    btn.disabled = false;
  });
}

// ── REVIEW ────────────────────────────────────────────────────────────────
function renderReview(main) {
  const pending = bounties.filter(b => ['requested','payment_pending'].includes(b.status));

  const cards = pending.length === 0
    ? `<div class="empty">Nothing awaiting review</div>`
    : pending.map(b => `
        <div class="card" id="card-${b.id}">
          <div class="card-row"><span class="card-label">Target</span><span class="card-value">${esc(b.targetName||'')}</span></div>
          <div class="card-row"><span class="card-label">Tier</span><span class="card-value">${esc(b.tierLabel)}</span></div>
          <div class="card-row"><span class="card-label">Price</span><span class="card-value">${fmt(b.price * PRICE_UNIT)}</span></div>
          <div class="card-row"><span class="card-label">Hunter gets</span><span class="card-value" style="color:var(--green)">${fmt(hunterPay(b.price))}</span></div>
          <div class="card-row"><span class="card-label">Admin cut</span><span class="card-value" style="color:var(--amber)">${fmt(adminPay(b.price))}</span></div>
          <div class="card-row"><span class="card-label">Requested by</span><span class="card-value">${esc(b.posterLabel||'')}</span></div>
          ${b.notes ? `<div class="card-row"><span class="card-label">Notes</span><span class="card-value">${esc(b.notes)}</span></div>` : ''}
          <div class="card-row"><span class="card-label">Status</span><span class="card-value">${statusBadge(b.status)}</span></div>
          ${b.paymentProof ? `<div class="card-row"><span class="card-label">Proof</span><span class="card-value">${esc(b.paymentProof)}</span></div>` : ''}
          ${b.status === 'requested' ? `
            <div class="form-group" style="margin-top:12px;">
              <label class="form-label">Adjust Price ($ millions, optional)</label>
              <input class="adj-price" data-id="${b.id}" type="number" min="1" step="0.5" placeholder="leave blank to keep" />
            </div>
            <div class="proof-input-row">
              <input class="proof-inp" data-id="${b.id}" type="text" placeholder="Payment proof (log link or item ID)" />
              <button class="btn btn-red" data-action="submit-payment" data-id="${b.id}">Submit</button>
            </div>
          ` : ''}
          ${b.status === 'payment_pending' ? `
            <div class="btn-row">
              <button class="btn btn-green" data-action="approve" data-id="${b.id}">Approve &amp; List</button>
            </div>
          ` : ''}
          <div class="btn-row">
            <button class="btn" style="color:var(--dim);font-size:10px;" data-action="delete-review" data-id="${b.id}">🗑 Delete Bounty</button>
          </div>
          <div class="review-msg" data-id="${b.id}"></div>
        </div>
      `).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">📋 Review Queue</div>
    </div>
    ${cards}
  `;

  main.querySelectorAll('[data-action="submit-payment"]').forEach(btn =>
    btn.addEventListener('click', async () => {
      const id    = btn.dataset.id;
      const proof = main.querySelector(`.proof-inp[data-id="${id}"]`).value.trim();
      const adj   = main.querySelector(`.adj-price[data-id="${id}"]`).value.trim();
      const msgEl = main.querySelector(`.review-msg[data-id="${id}"]`);
      if (!proof) { msgEl.innerHTML = `<div class="msg-error">Proof is required.</div>`; return; }
      btn.disabled = true;
      try {
        await api('/bounties/submit-payment', {
          bountyId: id, proof,
          ...(adj ? { adjustedPrice: parseFloat(adj) } : {}),
        });
        await loadBounties();
        renderReview(main);
      } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
    }));

  main.querySelectorAll('[data-action="approve"]').forEach(btn =>
    btn.addEventListener('click', async () => {
      const id    = btn.dataset.id;
      const msgEl = main.querySelector(`.review-msg[data-id="${id}"]`);
      btn.disabled = true;
      try {
        await api('/bounties/approve-payment', { bountyId: id });
        await loadBounties();
        renderReview(main);
      } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
    }));
}

// ── BALANCE ───────────────────────────────────────────────────────────────
async function renderBalance(main) {
  main.innerHTML = `<div class="loading">Loading balance...</div>`;
  try {
    const res  = await api('/balance/get');
    const bal  = res.balance;
    const hist = res.history || [];
    const agentNum = res.agentNumber;

    const histRows = hist.length === 0
      ? `<div class="empty">No completed contracts yet</div>`
      : [...hist].reverse().map(h => `
          <div class="hist-row">
            <div>
              <div class="hist-target">${esc(h.target||'Unknown')}</div>
              <div class="hist-date">${new Date(h.completedAt).toLocaleDateString()}</div>
            </div>
            <div class="hist-amount">+${fmt(h.hunterPayout)}</div>
          </div>`).join('');

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Blacklist Recon</div>
        <div class="page-title">💰 My Balance</div>
      </div>
      <div class="balance-hero">
        <div class="balance-amount">${fmt(bal.total)}</div>
        <div class="balance-label">Available Balance</div>
        ${identity.role !== 'admin' ? `<div class="balance-agent">Agent #${agentNum||'?'}</div>` : `<div class="balance-agent">${esc(identity.name)}</div>`}
        ${bal.pendingWithdrawal > 0 ? `<div style="color:var(--amber);font-family:'Share Tech Mono',monospace;font-size:11px;margin-top:8px;">⏳ ${fmt(bal.pendingWithdrawal)} withdrawal pending</div>` : ''}
      </div>
      <div class="form-group" style="display:flex;gap:8px;">
        <input id="withdraw-amt" type="number" min="1" placeholder="Amount to withdraw" style="flex:1;margin:0;" />
        <button class="btn btn-red" id="withdraw-btn">Request</button>
      </div>
      <div id="withdraw-msg"></div>
      <div class="section-head">Payout History</div>
      ${histRows}
    `;

    main.querySelector('#withdraw-btn').addEventListener('click', async () => {
      const amount = Number(main.querySelector('#withdraw-amt').value);
      const msgEl  = main.querySelector('#withdraw-msg');
      if (!amount || amount <= 0) { msgEl.innerHTML = `<div class="msg-error">Enter a valid amount.</div>`; return; }
      try {
        await api('/balance/request-withdrawal', { amount });
        msgEl.innerHTML = `<div class="msg-success">Withdrawal requested! Admin will process soon.</div>`;
        await renderBalance(main);
      } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

  } catch (e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── REVIEWS (admin only) ──────────────────────────────────────────────────
async function renderReviews(main) {
  main.innerHTML = `<div class="loading">Loading reviews...</div>`;
  try {
    const res  = await api('/testimonials/admin');
    const all  = res.testimonials || [];
    const pending  = all.filter(t => !t.approved);
    const approved = all.filter(t => t.approved);

    const tierLabels = {
      standard:    'Tier I · Standard Hit',
      war_support: 'Tier II · War Support',
      high_value:  'Tier III · High-Value',
    };

    function reviewCard(t, showActions) {
      return `
        <div class="card" id="rev-${t.id}">
          <div class="card-row">
            <span class="card-label">From</span>
            <span class="card-value" style="color:var(--gold)">${esc(t.tornUsername)}</span>
          </div>
          <div class="card-row">
            <span class="card-label">Torn ID</span>
            <span class="card-value">
              <a href="https://www.torn.com/profiles.php?XID=${esc(t.tornId)}" target="_blank"
                style="color:var(--dim);font-size:11px;">${esc(t.tornId)} ↗</a>
            </span>
          </div>
          <div class="card-row">
            <span class="card-label">Tier</span>
            <span class="card-value">${tierLabels[t.tier] || t.tier}</span>
          </div>
          <div class="card-row">
            <span class="card-label">Date</span>
            <span class="card-value" style="color:var(--dim)">${new Date(t.submittedAt).toLocaleDateString()}</span>
          </div>
          <div style="margin:10px 0;padding:12px;background:var(--void);border:1px solid var(--border);
                      font-size:14px;color:var(--text);line-height:1.7;font-style:italic;">
            "${esc(t.quote)}"
          </div>
          ${showActions ? `
            <div class="btn-row">
              <button class="btn btn-green" data-action="approve-review" data-id="${t.id}">✓ Approve</button>
              <button class="btn btn-red" data-action="reject-review" data-id="${t.id}">✕ Reject</button>
            </div>
            <div class="rev-msg" data-id="${t.id}"></div>
          ` : `
            <div class="btn-row">
              <button class="btn" style="color:var(--dim);font-size:10px;" data-action="reject-review" data-id="${t.id}">🗑 Remove</button>
            </div>
          `}
        </div>
      `;
    }

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Admin · Blacklist Recon</div>
        <div class="page-title">⭐ Reviews</div>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(2,1fr);">
        <div class="stat-card">
          <div class="stat-value" style="font-size:36px;">${pending.length}</div>
          <div class="stat-label">Awaiting Approval</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="font-size:36px;">${approved.length}</div>
          <div class="stat-label">Live on Site</div>
        </div>
      </div>

      ${pending.length > 0 ? `
        <div class="section-head">Pending Approval</div>
        ${pending.map(t => reviewCard(t, true)).join('')}
      ` : `<div class="section-head">Pending Approval</div><div class="empty">No pending reviews</div>`}

      ${approved.length > 0 ? `
        <div class="section-head">Approved & Live</div>
        ${approved.map(t => reviewCard(t, false)).join('')}
      ` : ''}
    `;

    main.querySelectorAll('[data-action="approve-review"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id    = btn.dataset.id;
        const msgEl = main.querySelector(`.rev-msg[data-id="${id}"]`);
        btn.disabled = true;
        try {
          await api('/testimonials/moderate', { testimonialId: id, action: 'approve' });
          msgEl.innerHTML = `<div class="msg-success">Approved — now live on the site.</div>`;
          setTimeout(() => renderReviews(main), 1200);
        } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="reject-review"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        if (!confirm('Remove this review permanently?')) return;
        btn.disabled = true;
        try {
          await api('/testimonials/moderate', { testimonialId: id, action: 'reject' });
          document.getElementById(`rev-${id}`)?.remove();
        } catch(e) { alert(e.message); btn.disabled = false; }
      }));

  } catch(e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────
async function renderAdmin(main) {
  main.innerHTML = `<div class="loading">Loading...</div>`;
  try {
    let allBal = { factionPool: { total: 0 }, memberBalances: {} };
    let roles  = { roles: { admin: [], lister: [], verifier: [], hunter: [] } };
    try { allBal = await api('/balance/all'); } catch(e) {}
    try { roles  = await api('/roles/list');  } catch(e) {}
    const pool    = allBal.factionPool || { total: 0 };
    const balances = allBal.memberBalances || {};
    const roleData = roles.roles || {};
    const roleNames = ['admin','lister','verifier','hunter'];

    const memberRows = Object.entries(balances).length === 0
      ? `<div class="empty">No balances yet</div>`
      : Object.entries(balances).map(([id, m]) => `
          <div class="card">
            <div class="card-row">
              <span class="card-label">Agent</span>
              <span class="card-value">${esc(m.name)}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Balance</span>
              <span class="card-value" style="color:var(--green)">${fmt(m.total)}</span>
            </div>
            ${m.pendingWithdrawal > 0 ? `
              <div class="card-row">
                <span class="card-label">Pending</span>
                <span class="card-value" style="color:var(--amber)">${fmt(m.pendingWithdrawal)}</span>
              </div>
              <div class="btn-row">
                <a href="https://www.torn.com/trade.php#step=start&userID=${id}" target="_blank" class="btn">Open Trade ↗</a>
                <button class="btn btn-green" data-action="pay" data-id="${id}">Mark Paid</button>
              </div>
            ` : ''}
            <div class="pay-msg" data-id="${id}"></div>
          </div>`).join('');

    const roleCards = roleNames.map(r => `
      <div class="card">
        <div class="card-row">
          <span class="card-label">${r}</span>
          <span class="card-value" style="color:var(--dim)">${(roleData[r]||[]).join(', ') || '—'}</span>
        </div>
      </div>`).join('');

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Admin · Blacklist Recon</div>
        <div class="page-title">⚙️ Admin Panel</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${fmt(pool.total)}</div>
          <div class="stat-label">Faction Pool</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${bounties.filter(b=>b.status==='completed').length}</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${Object.values(balances).filter(b=>b.pendingWithdrawal>0).length}</div>
          <div class="stat-label">Pending Payouts</div>
        </div>
      </div>

      <div class="section-head">Your Alias</div>
      <div id="alias-msg"></div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input id="alias-input" type="text" placeholder="Your codename e.g. The Handler" style="flex:1;" />
        <button class="btn btn-red" id="alias-save-btn">Save Alias</button>
      </div>
      <div class="section-head">Member Balances</div>
      ${memberRows}
      <div class="section-head">Reset Balances</div>
      <div id="reset-msg"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
        <input id="reset-id" type="text" placeholder="Torn ID to reset (blank = reset ALL)" style="flex:1;min-width:160px;" />
        <button class="btn btn-red" id="reset-one-btn">Reset Player</button>
        <button class="btn" style="color:var(--dim);" id="reset-all-btn">⚠ Reset Everyone</button>
      </div>

      <div class="section-head">Manage Roles</div>
      <div id="role-msg"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <input id="role-id" type="text" placeholder="Torn player ID" style="flex:1;min-width:140px;" />
        <select id="role-sel" style="flex:1;min-width:120px;">
          ${roleNames.map(r=>`<option value="${r}">${r}</option>`).join('')}
        </select>
        <button class="btn btn-green" data-act="add">Add</button>
        <button class="btn btn-red" data-act="remove">Remove</button>
      </div>
      <div class="section-head">Current Roles</div>
      ${roleCards}
    `;

    main.querySelectorAll('[data-action="lift-probation"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id    = btn.dataset.id;
        const msgEl = main.querySelector(`.pay-msg[data-id="${id}"]`);
        btn.disabled = true;
        try {
          await api('/rank/override-probation', { targetTornId: id });
          msgEl.innerHTML = `<div class="msg-success">Probation lifted.</div>`;
          await renderAdmin(main);
        } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="pay"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id    = btn.dataset.id;
        const msgEl = main.querySelector(`.pay-msg[data-id="${id}"]`);
        btn.disabled = true;
        try {
          await api('/balance/approve-withdrawal', { targetTornId: id });
          msgEl.innerHTML = `<div class="msg-success">Marked as paid.</div>`;
          await renderAdmin(main);
        } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    try {
      const aliasRes = await api('/alias/get');
      const aliasInput = main.querySelector('#alias-input');
      if (aliasInput && aliasRes.alias) aliasInput.value = aliasRes.alias;
    } catch(e) {}

    const aliasSaveBtn = main.querySelector('#alias-save-btn');
    if (aliasSaveBtn) {
      aliasSaveBtn.addEventListener('click', async () => {
        const alias = main.querySelector('#alias-input').value.trim();
        const msgEl = main.querySelector('#alias-msg');
        if (!alias) { msgEl.innerHTML = '<div class="msg-error">Enter an alias.</div>'; return; }
        aliasSaveBtn.disabled = true;
        try {
          await api('/alias/set', { alias });
          msgEl.innerHTML = '<div class="msg-success">Alias saved! You now appear as ' + esc(alias) + ' to others.</div>';
        } catch(e) { msgEl.innerHTML = '<div class="msg-error">' + esc(e.message) + '</div>'; }
        aliasSaveBtn.disabled = false;
      });
    }

    main.querySelectorAll('[data-act]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const tornId = main.querySelector('#role-id').value.trim();
        const role   = main.querySelector('#role-sel').value;
        const msgEl  = main.querySelector('#role-msg');
        if (!tornId) { msgEl.innerHTML = `<div class="msg-error">Enter a Torn ID.</div>`; return; }
        btn.disabled = true;
        try {
          await api('/roles/set', { targetTornId: tornId, role, action: btn.dataset.act });
          msgEl.innerHTML = `<div class="msg-success">Role updated.</div>`;
          await renderAdmin(main);
        } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    // Reset balance buttons
    const resetMsg = main.querySelector('#reset-msg');
    main.querySelector('#reset-one-btn').addEventListener('click', async () => {
      const tornId = main.querySelector('#reset-id').value.trim();
      if (!tornId) { resetMsg.innerHTML = `<div class="msg-error">Enter a Torn ID to reset a single player.</div>`; return; }
      if (!confirm(`Reset balance for ${tornId}? This cannot be undone.`)) return;
      try {
        await api('/balance/reset', { targetTornId: tornId });
        resetMsg.innerHTML = `<div class="msg-success">Balance reset for ${tornId}.</div>`;
        await renderAdmin(main);
      } catch(e) { resetMsg.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

    main.querySelector('#reset-all-btn').addEventListener('click', async () => {
      if (!confirm('Reset ALL member balances and faction pool? This cannot be undone.')) return;
      if (!confirm('Are you sure? This will wipe every balance including the faction pool.')) return;
      try {
        await api('/balance/reset', {});
        resetMsg.innerHTML = `<div class="msg-success">All balances and faction pool have been reset.</div>`;
        await renderAdmin(main);
      } catch(e) { resetMsg.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

  } catch (e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

      <div class="page-header">
        <div class="page-eyebrow">Blacklist Recon</div>
        <div class="page-title">📨 Inbox <span style="font-size:14px;color:var(--dim);">(${messages.filter(m=>!m.read).length} unread)</span></div>
      </div>
      ${cards}
    `;

    // Wire buttons
    main.querySelectorAll('[data-action="mark-read"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try {
          await api('/messages/read', { messageId: btn.dataset.id });
          await renderMessages(main);
        } catch(e) { btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="add-note"]').forEach(btn =>
      btn.addEventListener('click', () => {
        const form = main.querySelector(`.note-form[data-id="${btn.dataset.id}"]`);
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
      }));

    main.querySelectorAll('[data-action="save-note"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const note  = main.querySelector(`.note-input[data-id="${btn.dataset.id}"]`).value.trim();
        const msgEl = main.querySelector(`.msg-feedback[data-id="${btn.dataset.id}"]`);
        btn.disabled = true;
        try {
          await api('/messages/note', { messageId: btn.dataset.id, note });
          msgEl.innerHTML = `<div class="msg-success" style="margin-top:6px;">Note saved.</div>`;
          await renderMessages(main);
        } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="delete-msg"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this message?')) return;
        btn.disabled = true;
        try {
          await api('/messages/delete', { messageId: btn.dataset.id });
          await renderMessages(main);
        } catch(e) { btn.disabled = false; }
      }));

  } catch(e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── CHAT ──────────────────────────────────────────────────────────────────
let chatPollInterval = null;
let lastMessageTime  = 0;
let myDisplayName    = null;

async function getMyDisplayName() {
  if (myDisplayName) return myDisplayName;
  try {
    const res = await api('/alias/get');
    const agentRes = await api('/balance/get');
    myDisplayName = res.alias || (agentRes.agentNumber ? `Agent #${agentRes.agentNumber}` : identity.name);
  } catch(e) {
    myDisplayName = identity.name;
  }
  return myDisplayName;
}

async function renderChat(main) {
  const displayName = await getMyDisplayName();

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">💬 Ops Channel</div>
    </div>
    <div class="chat-window">
      <div class="chat-messages" id="chat-msgs"><div class="chat-empty">Loading messages...</div></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message... (500 chars max)" maxlength="500" />
        <button class="btn btn-red" id="chat-send">Send</button>
      </div>
    </div>
  `;

  async function loadMessages(initial = false) {
    try {
      const res      = await api('/chat/messages', { since: initial ? 0 : lastMessageTime });
      const msgsEl   = main.querySelector('#chat-msgs');
      if (!msgsEl) return;
      const msgs     = res.messages || [];
      if (msgs.length === 0 && initial) {
        msgsEl.innerHTML = '<div class="chat-empty">No messages yet. Say something.</div>';
        return;
      }
      if (msgs.length > 0) {
        lastMessageTime = Math.max(...msgs.map(m => m.timestamp));
        if (initial) msgsEl.innerHTML = '';
        msgs.forEach(m => {
          const isMine    = m.sender === displayName;
          const isAdmin   = m.role === 'admin';
          const time      = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          const div       = document.createElement('div');
          div.className   = `chat-msg ${isMine ? 'mine' : 'theirs'} ${isAdmin ? 'admin-msg' : ''}`;
          div.dataset.id  = m.id;
          div.innerHTML   = `
            <div class="chat-meta">
              <span class="chat-sender">${esc(m.sender)}</span> · ${time}
              ${identity.role === 'admin' && !isMine ? `<button onclick="deleteMsg('${m.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;margin-left:6px;">✕</button>` : ''}
            </div>
            <div class="chat-bubble">${esc(m.message)}</div>
          `;
          msgsEl.appendChild(div);
        });
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }
    } catch(e) {}
  }

  window.deleteMsg = async (id) => {
    try {
      await api('/chat/delete', { messageId: id });
      const el = main.querySelector(`[data-id="${id}"]`);
      if (el) el.remove();
    } catch(e) {}
  };

  await loadMessages(true);

  // Poll every 5 seconds
  if (chatPollInterval) clearInterval(chatPollInterval);
  chatPollInterval = setInterval(() => {
    if (currentPage === 'chat') loadMessages(false);
    else clearInterval(chatPollInterval);
  }, 5000);

  const sendBtn   = main.querySelector('#chat-send');
  const chatInput = main.querySelector('#chat-input');

  async function sendMessage() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    sendBtn.disabled = true;
    chatInput.value  = '';
    try {
      await api('/chat/send', { message: msg });
      await loadMessages(false);
    } catch(e) {
      chatInput.value = msg;
    }
    sendBtn.disabled = false;
    chatInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  chatInput.focus();
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('api-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logout-btn').addEventListener('click', logout);

// Auto-login if key saved
if (apiKey) {
  (async () => {
    try {
      const res = await api('/whoami');
      identity = { tornId: res.tornId, name: res.name, role: res.role };
      await loadBounties();
      showApp();
    } catch (e) {
      localStorage.removeItem('blhq_api_key');
      apiKey = '';
    }
  })();
}
</script>
