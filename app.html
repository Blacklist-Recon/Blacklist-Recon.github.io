<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blacklist HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #080a0a;
    --ash: #0c0a0a;
    --obsidian: #120d0d;
    --slate: #1a1010;
    --border: #2e1f1f;
    --muted: #4a2020;
    --dim: #7d5252;
    --text: #e6c8c8;
    --bright: #f5dada;
    --blood: #8b1a1a;
    --crimson: #c0392b;
    --ember: #e04f4f;
    --gold: #c9a84c;
    --gold-dim: #7a5f28;
    --green: #5fe04f;
    --amber: #e0a14f;
    --blue: #4f9ce0;
    --purple: #c14fe0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── SCANLINES ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(139,26,26,0.1) 0%, transparent 70%);
  }
  .login-skull { font-size: 48px; margin-bottom: 16px; }
  .login-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .login-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--ash);
    border: 1px solid var(--border);
    padding: 28px;
  }
  .login-box label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .login-box input {
    width: 100%;
    background: var(--void);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    margin-bottom: 16px;
    outline: none;
  }
  .login-box input:focus { border-color: var(--ember); }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--blood);
    border: 1px solid var(--crimson);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--crimson); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .login-error {
    color: var(--ember);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    margin-top: 12px;
    text-align: center;
  }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: rgba(8,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--ember);
    text-transform: uppercase;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .agent-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .agent-badge span { color: var(--ember); }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-logout:hover { color: var(--ember); border-color: var(--ember); }

  /* ── BOTTOM NAV (mobile) ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: rgba(8,10,10,0.97);
    border-top: 1px solid var(--border);
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    gap: 4px;
    border: none;
    background: none;
    transition: color 0.15s;
  }
  .nav-item .nav-icon { font-size: 18px; line-height: 1; }
  .nav-item.active { color: var(--ember); }
  .nav-item:hover { color: var(--text); }

  /* ── DESKTOP SIDEBAR ── */
  .desktop-layout {
    display: flex;
    flex: 1;
    padding-bottom: 60px;
  }
  @media (min-width: 768px) {
    .bottom-nav { display: none; }
    .desktop-layout { padding-bottom: 0; }
    .sidebar {
      display: flex !important;
      flex-direction: column;
      width: 200px;
      min-width: 200px;
      border-right: 1px solid var(--border);
      padding: 20px 0;
      background: var(--ash);
      position: sticky;
      top: 53px;
      height: calc(100vh - 53px);
      overflow-y: auto;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .sidebar-item .nav-icon { font-size: 16px; }
    .sidebar-item.active { color: var(--ember); background: rgba(139,26,26,0.15); border-left: 2px solid var(--ember); }
    .sidebar-item:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }
  }
  .sidebar { display: none; }

  /* ── MAIN CONTENT ── */
  .main-content {
    flex: 1;
    padding: 20px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .page-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--blood);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--bright);
    letter-spacing: 1px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .card-row:last-child { margin-bottom: 0; }
  .card-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .card-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--bright);
    text-align: right;
    word-break: break-word;
  }

  /* ── STATUS BADGES ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .badge-requested      { background: #3a3320; color: #e0c84f; }
  .badge-payment_pending { background: #3a2c20; color: #e0a14f; }
  .badge-listed         { background: #1a2030; color: #4f9ce0; }
  .badge-approved       { background: #1a2030; color: #4f9ce0; }
  .badge-claimed        { background: #2c2038; color: #c14fe0; }
  .badge-completed           { background: #1f2e1f; color: #5fe04f; }
  .badge-pending_verification { background: #2c1f38; color: #c084fc; border: 1px solid #6b21a8; }

  /* ── BUTTONS ── */
  .btn {
    background: var(--slate);
    border: 1px solid var(--muted);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--blood); border-color: var(--ember); color: var(--bright); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-green { background: #0a200a; border-color: #204a20; color: #9ae89a; }
  .btn-green:hover { background: #102e10; border-color: #2d6a2d; }
  .btn-red { background: #200a0a; border-color: #4a2020; color: #e89a9a; }
  .btn-red:hover { background: #2e1010; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .form-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--void);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--ember); }
  select option { background: var(--ash); }

  /* ── STATS GRID ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--ember);
    text-shadow: 0 0 20px rgba(224,79,79,0.3);
    margin-bottom: 4px;
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── EMPTY / ERROR / SUCCESS ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .msg-error {
    background: rgba(139,26,26,0.15);
    border: 1px solid var(--blood);
    color: var(--ember);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .msg-success {
    background: rgba(31,46,31,0.5);
    border: 1px solid #204a20;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .loading {
    text-align: center;
    padding: 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── SECTION HEAD ── */
  .section-head {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--blood);
    text-transform: uppercase;
    margin: 24px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--ember); color: var(--ember); background: rgba(139,26,26,0.15); }
  .filter-btn:hover:not(.active) { border-color: var(--dim); color: var(--text); }

  /* ── ROSTER TABLE ── */
  .roster-table { width: 100%; border-collapse: collapse; }
  .roster-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .roster-table td {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text);
    padding: 10px 12px;
    border-bottom: 1px solid rgba(46,31,31,0.4);
  }
  .roster-table tr:hover td { background: rgba(139,26,26,0.05); }

  /* ── BALANCE BIG ── */
  .balance-hero {
    text-align: center;
    padding: 28px;
    background: var(--obsidian);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    position: relative;
  }
  .balance-hero::before, .balance-hero::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--ember);
    border-style: solid;
  }
  .balance-hero::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .balance-hero::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .balance-amount {
    font-family: 'Share Tech Mono', monospace;
    font-size: 42px;
    color: var(--ember);
    text-shadow: 0 0 30px rgba(224,79,79,0.4);
    margin-bottom: 4px;
  }
  .balance-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .balance-agent {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--blood);
    letter-spacing: 2px;
    margin-top: 8px;
  }

  /* ── HIST ROWS ── */
  .hist-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(46,31,31,0.4);
    gap: 12px;
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-target { font-size: 13px; color: var(--bright); }
  .hist-date { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); }
  .hist-amount { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--green); white-space: nowrap; }

  /* ── PROOF INPUT ── */
  .proof-input-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 10px; }
  .proof-input-row input { flex: 1; margin: 0; }

  @media (max-width: 767px) {
    .main-content { padding: 16px; }
    .card-row { flex-direction: column; align-items: flex-start; gap: 2px; }
    .card-value { text-align: left; }
  }

  /* ── RANK BADGES ── */
  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 10px 2px 6px;
    border-radius: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    white-space: nowrap;
  }
  .rank-badge .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .badge-ghost       { background: #1a2332; color: #6a7f94; border: 1px solid #2a3a4a; }
  .badge-blade       { background: #1a2030; color: #4f9ce0; border: 1px solid #2a3050; }
  .badge-phantom     { background: #2c1f38; color: #c084fc; border: 1px solid #3c2f48; }
  .badge-reaper      { background: #2e1010; color: #e74c3c; border: 1px solid #4e2020; }
  .badge-wraith      { background: #1a1a2a; color: #c8d8e8; border: 1px solid #2a2a3a; }
  .badge-shadow_hand { background: #2a1e08; color: #c9a84c; border: 1px solid #4a3018; }
  .badge-admin       { background: linear-gradient(90deg,#2a1008,#1a1808); color: #c9a84c; border: 1px solid #8b1a1a; }
  .badge-lister      { background: #2a1e08; color: #e0a14f; border: 1px solid #4a3010; }
  .badge-verifier    { background: #0a2028; color: #22b8cc; border: 1px solid #0a4050; }
  .badge-probation   { background: #3a3010; color: #e0c84f; border: 1px solid #5a4010; }

  .rank-progress {
    margin-top: 8px;
    background: var(--void);
    border: 1px solid var(--border);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }
  .rank-progress-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* ── MESSAGES ── */
  .msg-badge {
    display: inline-block;
    background: var(--ember);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
    animation: pulse-badge 2s ease-in-out infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .inbox-card {
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .inbox-card.unread { border-left: 3px solid var(--ember); }
  .inbox-card.read   { opacity: 0.7; }
  .inbox-subject {
    font-size: 15px;
    font-weight: 600;
    color: var(--bright);
    margin-bottom: 6px;
  }
  .inbox-message {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .inbox-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .inbox-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .inbox-note {
    background: rgba(139,26,26,0.1);
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
  }

  /* ── CHAT ── */
  .chat-window {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px);
    min-height: 400px;
    background: var(--obsidian);
    border: 1px solid var(--border);
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 85%;
  }
  .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
  .chat-msg.theirs { align-self: flex-start; align-items: flex-start; }
  .chat-bubble {
    padding: 8px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .chat-msg.mine .chat-bubble {
    background: var(--blood);
    border: 1px solid var(--crimson);
    color: var(--bright);
    border-radius: 8px 8px 0 8px;
  }
  .chat-msg.theirs .chat-bubble {
    background: var(--slate);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px 8px 8px 0;
  }
  .chat-msg.admin-msg .chat-bubble {
    background: rgba(139,26,26,0.3);
    border-color: var(--ember);
  }
  .chat-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    padding: 0 4px;
  }
  .chat-sender { color: var(--ember); }
  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
    background: var(--ash);
  }
  .chat-input-row input {
    flex: 1;
    margin: 0;
    background: var(--void);
  }
  .chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
</style>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☠</text></svg>">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-skull">☠</div>
  <div class="login-title">Blacklist HQ</div>
  <div class="login-sub">Blacklist Recon · Command Center</div>
  <div class="login-box">
    <label>Torn API Key</label>
    <input type="password" id="api-key-input" placeholder="Paste your Torn API key" autocomplete="off" />
    <button class="btn-primary" id="login-btn">Authenticate</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">☠ Blacklist HQ</div>
    <div class="topbar-right">
      <div class="agent-badge" id="agent-badge"></div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </div>

  <div class="desktop-layout">
    <!-- Sidebar (desktop) -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="loading">Loading...</div>
    </main>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
const WORKER_URL = 'https://torn-bounty-board.pearcej29.workers.dev';
const PRICE_UNIT = 1_000_000;
const HUNTER_CUT = 0.75;
const ADMIN_CUT  = 0.25;

let apiKey   = localStorage.getItem('blhq_api_key') || '';
let identity = null;
let bounties = [];
let tiers    = {};
let currentPage = 'board';
let filterStatus = 'all';

function fmt(n)  { return '$' + Math.round(n).toLocaleString(); }

// Badge helpers
function rankBadge(rankId, rankName, onProbation) {
  const probTag = onProbation
    ? '<span class="rank-badge badge-probation" style="margin-left:4px;"><span class="badge-dot" style="background:#e0c84f"></span>Probation</span>'
    : '';
  const cls = 'badge-' + (rankId || 'ghost');
  const dotColors = {
    ghost:'#6a7f94', blade:'#4f9ce0', phantom:'#c084fc',
    reaper:'#e74c3c', wraith:'#c8d8e8', shadow_hand:'#c9a84c'
  };
  const dot = dotColors[rankId] || '#6a7f94';
  return `<span class="rank-badge ${cls}"><span class="badge-dot" style="background:${dot}"></span>${rankName}</span>${probTag}`;
}

function roleBadge(role) {
  const map = {
    admin:    {cls:'badge-admin',    name:'The Handler', dot:'#c9a84c'},
    lister:   {cls:'badge-lister',   name:'Lister',      dot:'#e0a14f'},
    verifier: {cls:'badge-verifier', name:'Verifier',    dot:'#22b8cc'},
  };
  const b = map[role];
  if (!b) return '';
  return `<span class="rank-badge ${b.cls}"><span class="badge-dot" style="background:${b.dot}"></span>${b.name}</span>`;
}
function formatDeadline(ts) {
  const diff = ts - Date.now();
  if (diff <= 0) return 'EXPIRED';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m remaining` : `${m}m remaining`;
}
function hunterPay(p) { return Math.round(p * PRICE_UNIT * HUNTER_CUT); }
function adminPay(p)  { return Math.round(p * PRICE_UNIT * ADMIN_CUT);  }
function esc(s)  { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }
function statusBadge(s) { return `<span class="badge badge-${s}">${s.replace('_',' ')}</span>`; }
function priceFor(price, role) {
  return (role === 'admin' || role === 'lister') ? fmt(price * PRICE_UNIT) : fmt(hunterPay(price));
}

// ── API ───────────────────────────────────────────────────────────────────
async function api(path, body = {}) {
  const res = await fetch(WORKER_URL + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey, ...body }),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Unknown error');
  return data;
}

// ── AUTH ──────────────────────────────────────────────────────────────────
async function login() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Authenticating...';
  errEl.textContent = '';
  try {
    apiKey = key;
    const res = await api('/whoami');
    identity = { tornId: res.tornId, name: res.name, role: res.role };
    localStorage.setItem('blhq_api_key', apiKey);
    await loadBounties();
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Authenticate';
  }
}

function logout() {
  apiKey = '';
  identity = null;
  localStorage.removeItem('blhq_api_key');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('api-key-input').value = '';
}

async function loadBounties() {
  const res = await api('/bounties/list');
  bounties = res.bounties;
  tiers    = res.tiers;
}

// ── APP SHELL ─────────────────────────────────────────────────────────────
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  const badge = document.getElementById('agent-badge');
  try {
    const aliasRes = await api('/alias/get');
    const displayName = aliasRes.alias || identity.name;
    if (identity.role === 'hunter') {
      // Get rank info
      try {
        const balRes = await api('/balance/get');
        const ri = balRes.rankInfo;
        if (ri) {
          badge.innerHTML = `<span style="color:var(--text);margin-right:8px;">${esc(displayName)}</span>${rankBadge(ri.rank.id, ri.rank.name, ri.onProbation)}`;
        } else {
          badge.innerHTML = `<span>${esc(displayName)}</span>`;
        }
      } catch(e) {
        badge.innerHTML = `<span>${esc(displayName)}</span>`;
      }
    } else {
      badge.innerHTML = `<span style="color:var(--text);margin-right:8px;">${esc(displayName)}</span>${roleBadge(identity.role)}`;
    }
  } catch(e) {
    badge.innerHTML = `<span>${esc(identity.name)}</span>`;
  }

  buildNav();
  navigate('board');

  // Poll every 30s for bounties + unread count
  let lastUnread = 0;
  async function pollUnread() {
    if (identity.role !== 'admin' && identity.role !== 'lister') return;
    try {
      const res = await api('/messages/unread');
      const count = res.unread || 0;
      // Update nav badge
      updateUnreadBadge(count);
      // Notify if new messages came in
      if (count > lastUnread && lastUnread !== -1) {
        showNotification(`📨 ${count} unread message${count > 1 ? 's' : ''} in Blacklist HQ`);
      }
      lastUnread = count;
    } catch(e) {}
  }
  function updateUnreadBadge(count) {
    document.querySelectorAll('[data-page="messages"]').forEach(el => {
      const existing = el.querySelector('.msg-badge');
      if (existing) existing.remove();
      if (count > 0) {
        const badge = document.createElement('span');
        badge.className = 'msg-badge';
        badge.textContent = count;
        el.appendChild(badge);
      }
    });
  }
  function showNotification(text) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Blacklist HQ', { body: text, icon: '/favicon.ico' });
    }
  }
  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  pollUnread();
  setInterval(async () => {
    await loadBounties();
    await pollUnread();
    if (currentPage === 'board') renderPage();
  }, 30000);
}

function navItems() {
  const items = [
    { id: 'board',   icon: '🎯', label: 'Board'   },
    { id: 'balance', icon: '💰', label: 'Balance'  },
  ];
  if (identity.role === 'admin' || identity.role === 'lister') {
    items.splice(1, 0, { id: 'new',    icon: '➕', label: 'New'    });
    items.splice(2, 0, { id: 'review', icon: '📋', label: 'Review' });
  }
  items.push({ id: 'chat', icon: '💬', label: 'Chat' });
  if (identity.role === 'admin' || identity.role === 'lister') {
    items.push({ id: 'messages',  icon: '📨', label: 'Messages'  });
    items.push({ id: 'campaigns', icon: '⚔️', label: 'Campaigns' });
  }
  if (identity.role === 'admin') {
    items.push({ id: 'ai',        icon: '🤖', label: 'AI Ops'      });
    items.push({ id: 'applications', icon: '📋', label: 'Applications' });
    items.push({ id: 'dashboard', icon: '📊', label: 'Intel'     });
    items.push({ id: 'challenges',icon: '🏆', label: 'Challenges'});
    items.push({ id: 'mentors',   icon: '🎓', label: 'Mentors'   });
    items.push({ id: 'referrals', icon: '🔗', label: 'Referrals' });
    items.push({ id: 'reviews',   icon: '⭐', label: 'Reviews'   });
    items.push({ id: 'roster',    icon: '👥', label: 'Roster'    });
    items.push({ id: 'admin',     icon: '⚙️', label: 'Admin'     });
  }
  // Challenges visible to all roles
  if (identity.role === 'hunter' || identity.role === 'verifier') {
    items.push({ id: 'challenges', icon: '🏆', label: 'Challenges' });
  }
  return items;
}

function buildNav() {
  const items = navItems();
  const sidebar = document.getElementById('sidebar');
  const bottomNav = document.getElementById('bottom-nav');

  sidebar.innerHTML = items.map(i => `
    <button class="sidebar-item ${currentPage === i.id ? 'active' : ''}" data-page="${i.id}">
      <span class="nav-icon">${i.icon}</span>${i.label}
    </button>
  `).join('');

  bottomNav.innerHTML = items.map(i => `
    <button class="nav-item ${currentPage === i.id ? 'active' : ''}" data-page="${i.id}">
      <span class="nav-icon">${i.icon}</span>${i.label}
    </button>
  `).join('');

  sidebar.querySelectorAll('[data-page]').forEach(el =>
    el.addEventListener('click', () => navigate(el.dataset.page)));
  bottomNav.querySelectorAll('[data-page]').forEach(el =>
    el.addEventListener('click', () => navigate(el.dataset.page)));
}

function navigate(page) {
  currentPage = page;
  filterStatus = 'all';
  buildNav();
  renderPage();
  window.scrollTo(0, 0);
}

function renderPage() {
  const main = document.getElementById('main-content');
  if (currentPage === 'board')   renderBoard(main);
  if (currentPage === 'new')     renderNew(main);
  if (currentPage === 'review')  renderReview(main);
  if (currentPage === 'balance') renderBalance(main);
  if (currentPage === 'chat')    renderChat(main);
  if (currentPage === 'messages')  renderMessages(main);
  if (currentPage === 'campaigns') renderCampaigns(main);
  if (currentPage === 'ai')           renderAI(main);
  if (currentPage === 'applications') renderApplications(main);
  if (currentPage === 'dashboard')  renderDashboard(main);
  if (currentPage === 'challenges') renderChallenges(main);
  if (currentPage === 'mentors')    renderMentors(main);
  if (currentPage === 'referrals')  renderReferrals(main);
  if (currentPage === 'reviews')   renderReviews(main);
  if (currentPage === 'roster')  renderRoster(main);
  if (currentPage === 'admin')   renderAdmin(main);
}

// ── BOARD ─────────────────────────────────────────────────────────────────
function renderBoard(main) {
  const isPriv = identity.role === 'admin' || identity.role === 'lister';
  const allStatuses = isPriv
    ? ['all','requested','payment_pending','listed','claimed','completed']
    : ['all','listed','claimed','completed'];

  let filtered = bounties.filter(b => filterStatus === 'all' || b.status === filterStatus);

  const filterBtns = allStatuses.map(s => `
    <button class="filter-btn ${filterStatus === s ? 'active' : ''}" data-filter="${s}">
      ${s === 'all' ? 'All' : s.replace('_',' ')}
    </button>
  `).join('');

  const cards = filtered.length === 0
    ? `<div class="empty">No bounties match this filter</div>`
    : filtered.map(b => {
        const target = b.targetName
          ? esc(b.targetName) + (b.targetXid ? ` [${esc(b.targetXid)}]` : '')
          : esc(b.targetLabel || 'Hidden');
        const poster = b.posterLabel ? esc(b.posterLabel) : '—';
        const claimed = b.claimedByName ? esc(b.claimedByName) : '—';
        const priceLabel = (identity.role === 'admin' || identity.role === 'lister') ? 'Price' : 'Payout (75%)';

        let actions = '';
        if (b.status === 'listed' && (identity.role === 'hunter' || identity.role === 'admin')) {
          actions += `<button class="btn btn-red" data-action="claim" data-id="${b.id}">Claim</button>`;
        }
        if (b.status === 'claimed' && (identity.role === 'verifier' || identity.role === 'admin')) {
          actions += `<button class="btn btn-green" data-action="complete" data-id="${b.id}">Mark Complete</button>`;
        }

        return `
          <div class="card">
            <div class="card-row">
              <span class="card-label">Target</span>
              <span class="card-value">${target}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Tier</span>
              <span class="card-value">
                ${esc(b.tierLabel)}
                ${b.tier === 'high_value' ? '<span style="font-family:Share Tech Mono,monospace;font-size:9px;color:var(--ember);letter-spacing:1px;margin-left:6px;">★ PRIORITY</span>' : ''}
              </span>
            </div>
            <div class="card-row">
              <span class="card-label">${priceLabel}</span>
              <span class="card-value">${priceFor(b.price, identity.role)}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Client</span>
              <span class="card-value">${poster}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Status</span>
              <span class="card-value">${statusBadge(b.status)}</span>
            </div>
            ${b.claimedByName ? `<div class="card-row"><span class="card-label">Agent</span><span class="card-value">${claimed}</span></div>` : ''}
            ${b.notes ? `<div class="card-row"><span class="card-label">Notes</span><span class="card-value">${esc(b.notes)}</span></div>` : ''}
            ${identity.role === 'admin' ? `<div class="btn-row"><button class="btn" style="color:var(--dim);font-size:10px;" data-action="delete" data-id="${b.id}">🗑 Delete</button></div>` : ''}
            ${actions ? `<div class="btn-row">${actions}</div>` : ''}
          </div>
        `;
      }).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">🎯 Target Board</div>
    </div>
    <div class="stats-grid" id="board-stats-grid">
      <div class="stat-card">
        <div class="stat-value">${bounties.filter(b=>b.status==='listed').length}</div>
        <div class="stat-label">Open</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${bounties.filter(b=>b.status==='claimed'||b.status==='pending_verification').length}</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${bounties.filter(b=>b.status==='completed').length}</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card" id="member-count-card">
        <div class="stat-value" id="app-member-count">—</div>
        <div class="stat-label">Agents</div>
      </div>
    </div>
    <div class="filter-bar">${filterBtns}</div>
    ${cards}
  `;

  // Load live member count
  api('/stats').then(res => {
    const el = main.querySelector('#app-member-count');
    if (el) el.textContent = res.memberCount ?? '—';
  }).catch(() => {});

  main.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => { filterStatus = btn.dataset.filter; renderBoard(main); }));

  main.querySelectorAll('[data-action]').forEach(btn =>
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const id     = btn.dataset.id;
      if (action === 'delete') {
        if (!confirm('Delete this bounty? If completed, payouts will be reversed.')) return;
      }
      btn.disabled = true;
      try {
        if (action === 'claim')    await api('/bounties/claim',    { bountyId: id });
        if (action === 'complete') await api('/bounties/complete', { bountyId: id });
        if (action === 'delete')   await api('/bounties/delete',   { bountyId: id });
        if (action === 'submit-proof') {
          const input = main.querySelector(`.proof-link-input[data-id="${id}"]`);
          const proof = input ? input.value.trim() : '';
          if (!proof) { alert('Please paste your attack log URL first.'); btn.disabled = false; return; }
          await api('/bounties/complete', { bountyId: id, proofLink: proof });
        }
        if (action === 'priority-front') {
          try {
            await api('/bounties/priority-upgrade', { bountyId: id, upgradeType: 'front' });
            await loadBounties(); renderBoard(main);
          } catch(e) { alert(e.message); }
          btn.disabled = false; return;
        }
        if (action === 'priority-dedicated') {
          try {
            await api('/bounties/priority-upgrade', { bountyId: id, upgradeType: 'dedicated' });
            await loadBounties(); renderBoard(main);
          } catch(e) { alert(e.message); }
          btn.disabled = false; return;
        }
        if (action === 'extend-deadline') {
          try {
            await api('/bounties/extend-deadline', { bountyId: id, reason: 'Hunter insurance — mugging reported' });
            await loadBounties(); renderBoard(main);
          } catch(e) { alert(e.message); }
          btn.disabled = false; return;
        }
        if (action === 'submit-hit') {
          const input = main.querySelector(`.proof-link-input[data-id="${id}"]`);
          const proof = input ? input.value.trim() : '';
          if (!proof) { alert('Please paste your attack log URL first.'); btn.disabled = false; return; }
          await api('/bounties/add-hit', { bountyId: id, proofLink: proof });
        }
        await loadBounties();
        renderBoard(main);
      } catch (e) {
        btn.disabled = false;
        alert(e.message);
      }
    }));
}

// ── NEW BOUNTY ────────────────────────────────────────────────────────────
function renderNew(main) {
  const tierOptions = Object.entries(tiers).map(([key, t]) => {
    const note = key === 'standard' ? '$1,000,000 fixed'
      : key === 'war_support'       ? '$3.5M – $5M'
      : 'From $3M (evaluated)';
    return `<option value="${key}">${esc(t.label)} — ${note}</option>`;
  }).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">➕ New Contract</div>
    </div>
    <div id="new-msg"></div>
    <div class="form-group">
      <label class="form-label">Target Name</label>
      <input id="n-name" type="text" placeholder="Player name in Torn" />
    </div>
    <div class="form-group">
      <label class="form-label">Target XID (optional)</label>
      <input id="n-xid" type="text" placeholder="e.g. 1234567" />
    </div>
    <div class="form-group">
      <label class="form-label">Tier</label>
      <select id="n-tier">${tierOptions}</select>
      <div class="form-hint" id="n-tier-hint"></div>
    </div>
    <div class="form-group" id="n-price-group">
      <label class="form-label">Price ($ millions)</label>
      <input id="n-price" type="number" min="1" step="0.5" placeholder="e.g. 3.5" />
      <div class="form-hint" id="n-price-hint"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes / Hit Count</label>
      <textarea id="n-notes" rows="3" placeholder="Number of hits, any context..."></textarea>
    </div>
    <button class="btn btn-red" id="n-submit" style="width:100%;padding:12px;">Submit Contract Request</button>
  `;

  const tierSel    = main.querySelector('#n-tier');
  const priceGroup = main.querySelector('#n-price-group');
  const tierHint   = main.querySelector('#n-tier-hint');
  const priceHint  = main.querySelector('#n-price-hint');
  const priceInput = main.querySelector('#n-price');

  function updateTier() {
    const key = tierSel.value;
    if (key === 'standard') {
      priceGroup.style.display = 'none';
      tierHint.textContent = 'Fixed price: $1,000,000. No override needed.';
    } else if (key === 'war_support') {
      priceGroup.style.display = 'block';
      priceInput.min = '3.5'; priceInput.max = '5'; priceInput.step = '0.5';
      priceInput.placeholder = '3.5 to 5';
      tierHint.textContent = 'Range: $3,500,000 – $5,000,000.';
      priceHint.textContent = 'Enter 3.5, 4, 4.5, or 5';
    } else {
      priceGroup.style.display = 'block';
      priceInput.min = '3'; priceInput.max = ''; priceInput.step = '0.5';
      priceInput.placeholder = 'Minimum 3';
      tierHint.textContent = 'Starts at $3M. Admin will confirm price before listing.';
      priceHint.textContent = 'Enter a number (millions)';
    }
  }
  tierSel.addEventListener('change', () => {
    updateTier();
    const key = tierSel.value;
    const hitsGroup = main.querySelector('#n-hits-group');
    if (hitsGroup) {
      hitsGroup.style.display = (key === 'war_support' || key === 'high_value') ? 'block' : 'none';
    }
  });
  updateTier();

  main.querySelector('#n-submit').addEventListener('click', async () => {
    const name     = main.querySelector('#n-name').value.trim();
    const xid      = main.querySelector('#n-xid').value.trim();
    const tier     = tierSel.value;
    const priceRaw = priceInput.value.trim();
    const notes    = main.querySelector('#n-notes').value.trim();
    const msgEl    = main.querySelector('#new-msg');
    msgEl.innerHTML = '';

    if (!name) { msgEl.innerHTML = `<div class="msg-error">Target name is required.</div>`; return; }

    const btn = main.querySelector('#n-submit');
    btn.disabled = true;
    try {
      await api('/bounties/create', {
        targetName: name, targetXid: xid, tier,
        price: tier === 'standard' ? 1 : (priceRaw ? parseFloat(priceRaw) : undefined),
        notes,
      });
      await loadBounties();
      msgEl.innerHTML = `<div class="msg-success">Contract submitted successfully.</div>`;
      main.querySelector('#n-name').value = '';
      main.querySelector('#n-xid').value  = '';
      main.querySelector('#n-notes').value = '';
      priceInput.value = '';
    } catch (e) {
      msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;

// ── REVIEW ────────────────────────────────────────────────────────────────
function renderReview(main) {
  const pending = bounties.filter(b => ['requested','payment_pending'].includes(b.status));

  const cards = pending.length === 0
    ? `<div class="empty">Nothing awaiting review</div>`
    : pending.map(b => `
        <div class="card" id="card-${b.id}">
          <div class="card-row"><span class="card-label">Target</span><span class="card-value">${esc(b.targetName||'')}</span></div>
          <div class="card-row"><span class="card-label">Tier</span><span class="card-value">${esc(b.tierLabel)}</span></div>
          <div class="card-row"><span class="card-label">Price</span><span class="card-value">${fmt(b.price * PRICE_UNIT)}</span></div>
          <div class="card-row"><span class="card-label">Hunter gets</span><span class="card-value" style="color:var(--green)">${fmt(hunterPay(b.price))}</span></div>
          <div class="card-row"><span class="card-label">Admin cut</span><span class="card-value" style="color:var(--amber)">${fmt(adminPay(b.price))}</span></div>
          <div class="card-row"><span class="card-label">Requested by</span><span class="card-value">${esc(b.posterLabel||'')}</span></div>
          ${b.notes ? `<div class="card-row"><span class="card-label">Notes</span><span class="card-value">${esc(b.notes)}</span></div>` : ''}
          <div class="card-row"><span class="card-label">Status</span><span class="card-value">${statusBadge(b.status)}</span></div>
          ${b.paymentProof ? `<div class="card-row"><span class="card-label">Proof</span><span class="card-value">${esc(b.paymentProof)}</span></div>` : ''}
          ${b.status === 'requested' ? `
            <div class="form-group" style="margin-top:12px;">
              <label class="form-label">Adjust Price ($ millions, optional)</label>
              <input class="adj-price" data-id="${b.id}" type="number" min="1" step="0.5" placeholder="leave blank to keep" />
            </div>
            <div class="proof-input-row">
              <input class="proof-inp" data-id="${b.id}" type="text" placeholder="Payment proof (log link or item ID)" />
              <button class="btn btn-red" data-action="submit-payment" data-id="${b.id}">Submit</button>
            </div>
          ` : ''}
          ${b.status === 'payment_pending' ? `
            <div class="btn-row">
              <button class="btn btn-green" data-action="approve" data-id="${b.id}">Approve &amp; List</button>
            </div>
          ` : ''}
          <div class="btn-row">
            <button class="btn" style="color:var(--dim);font-size:10px;" data-action="delete-review" data-id="${b.id}">🗑 Delete Bounty</button>
          </div>
          <div class="review-msg" data-id="${b.id}"></div>
        </div>
      `).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">📋 Review Queue</div>
    </div>
    ${cards}
  `;

  main.querySelectorAll('[data-action="submit-payment"]').forEach(btn =>
    btn.addEventListener('click', async () => {
      const id    = btn.dataset.id;
      const proof = main.querySelector(`.proof-inp[data-id="${id}"]`).value.trim();
      const adj   = main.querySelector(`.adj-price[data-id="${id}"]`).value.trim();
      const msgEl = main.querySelector(`.review-msg[data-id="${id}"]`);
      if (!proof) { msgEl.innerHTML = `<div class="msg-error">Proof is required.</div>`; return; }
      btn.disabled = true;
      try {
        await api('/bounties/submit-payment', {
          bountyId: id, proof,
          ...(adj ? { adjustedPrice: parseFloat(adj) } : {}),
        });
        await loadBounties();
        renderReview(main);
      } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
    }));

  main.querySelectorAll('[data-action="approve"]').forEach(btn =>
    btn.addEventListener('click', async () => {
      const id    = btn.dataset.id;
      const msgEl = main.querySelector(`.review-msg[data-id="${id}"]`);
      btn.disabled = true;
      try {
        await api('/bounties/approve-payment', { bountyId: id });
        await loadBounties();
        renderReview(main);
      } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
    }));
}

// ── BALANCE ───────────────────────────────────────────────────────────────
async function renderBalance(main) {
  main.innerHTML = `<div class="loading">Loading balance...</div>`;
  try {
    const res  = await api('/balance/get');
    const bal  = res.balance;
    const hist = res.history || [];
    const agentNum = res.agentNumber;

    const histRows = hist.length === 0
      ? `<div class="empty">No completed contracts yet</div>`
      : [...hist].reverse().map(h => `
          <div class="hist-row">
            <div>
              <div class="hist-target">${esc(h.target||'Unknown')}</div>
              <div class="hist-date">${new Date(h.completedAt).toLocaleDateString()}</div>
            </div>
            <div class="hist-amount">+${fmt(h.hunterPayout)}</div>
          </div>`).join('');

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Blacklist Recon</div>
        <div class="page-title">💰 My Balance</div>
      </div>
      <div class="balance-hero">
        <div class="balance-amount">${fmt(bal.total)}</div>
        <div class="balance-label">Available Balance</div>
        ${identity.role !== 'admin' ? `<div class="balance-agent">Agent #${agentNum||'?'}</div>` : `<div class="balance-agent">${esc(identity.name)}</div>`}
        ${bal.pendingWithdrawal > 0 ? `<div style="color:var(--amber);font-family:Share Tech Mono,monospace;font-size:11px;margin-top:8px;">⏳ ${fmt(bal.pendingWithdrawal)} withdrawal pending</div>` : ''}
      </div>
      <div class="form-group" style="display:flex;gap:8px;">
        <input id="withdraw-amt" type="number" min="1" placeholder="Amount to withdraw" style="flex:1;margin:0;" />
        <button class="btn btn-red" id="withdraw-btn">Request</button>
      </div>
      <div id="withdraw-msg"></div>
      <div class="section-head">Payout History</div>
      ${histRows}
    `;

    main.querySelector('#withdraw-btn').addEventListener('click', async () => {
      const amount = Number(main.querySelector('#withdraw-amt').value);
      const msgEl  = main.querySelector('#withdraw-msg');
      if (!amount || amount <= 0) { msgEl.innerHTML = `<div class="msg-error">Enter a valid amount.</div>`; return; }
      try {
        await api('/balance/request-withdrawal', { amount });
        msgEl.innerHTML = `<div class="msg-success">Withdrawal requested! Admin will process soon.</div>`;
        await renderBalance(main);
      } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

  } catch (e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── DASHBOARD (admin only) ────────────────────────────────────────────────
function miniBar(values, color, maxVal) {
  const max = maxVal || Math.max(...values, 1);
  return values.map((v,i) => `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
      <div style="width:100%;background:${color};opacity:${Math.max(0.1, v/max)};
                  height:${Math.max(2, Math.round((v/max)*40))}px;border-radius:1px;"></div>
      <div style="font-size:8px;color:var(--dim);">${i}</div>
    </div>`).join('');
}

        Banned members are permanently blocked from logging into the HQ app and Tampermonkey script.

      <div id="ban-msg"></div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">

        <input id="ban-name"   type="text" placeholder="Torn Name"     style="flex:1;min-width:120px;" />

      <div class="card" id="ban-list">

              <div class="card-row" style="flex-wrap:wrap;gap:8px;padding:12px 0;border-bottom:1px solid var(--border);">
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                    <a href="https://www.torn.com/profiles.php?XID=${esc(tid)}" target="_blank"
                       style="color:var(--ember);font-size:12px;">${esc(b.name)} [${esc(tid)}] ↗</a>
                  </div>
                  <div style="font-size:11px;color:var(--dim);">Reason: ${esc(b.reason)}</div>
                  <div style="font-size:10px;color:var(--muted);margin-top:2px;">
                    Banned ${new Date(b.bannedAt).toLocaleDateString()} by ${esc(b.bannedBy)}
                  </div>
                </div>
                <button class="btn" style="font-size:9px;padding:3px 10px;color:var(--green);border-color:var(--green);"
                  data-action="unban" data-id="${esc(tid)}">Unban</button>
              </div>`).join("")}
      </div>
    `;

    // Wire retaliation check
    main.querySelector('#ret-check-btn').addEventListener('click', async () => {
      const attackerId   = main.querySelector('#ret-attacker-id').value.trim();
      const attackerName = main.querySelector('#ret-attacker-name').value.trim();
      const victimName   = main.querySelector('#ret-victim-name').value.trim();
      const attackType   = main.querySelector('#ret-attack-type').value;
      const msgEl        = main.querySelector('#ret-check-msg');

      if (!attackerId || !attackerName || !victimName) {
        msgEl.innerHTML = '<div class="msg-error">Fill in attacker ID, attacker name, and victim name.</div>';
        return;
      }

      const btn = main.querySelector('#ret-check-btn');
      btn.disabled = true;
      btn.textContent = 'Checking records...';
      msgEl.innerHTML = '';

      try {
        const res = await api('/admin/retaliation/check', {
          attackerTornId: attackerId,
          attackerName,
          victimTornId: null,
          victimName,
          attackType,
        });

        if (res.isKnown) {
          const targetTag = res.wasTarget ? '<div style="font-size:10px;color:var(--ember);margin-bottom:4px;">● Previously a contract target</div>' : '';
          const clientTag = res.wasClient ? '<div style="font-size:10px;color:var(--amber);margin-bottom:4px;">● Previously a client</div>' : '';
          const bountyTag = res.autoBountyId ? '<div style="font-size:10px;color:var(--green);margin-top:8px;">✓ $1,000,000 bounty auto-posted — note: Attempted Retaliation / Mug Back</div>' : '';
          msgEl.innerHTML = `
            <div style="background:rgba(139,26,26,0.2);border:1px solid var(--blood);padding:14px;margin-bottom:12px;border-radius:2px;">
              <div style="font-size:11px;color:var(--ember);letter-spacing:2px;margin-bottom:8px;">⚠ KNOWN ENTITY CONFIRMED</div>
              <div style="font-size:13px;color:var(--text);margin-bottom:6px;">${esc(res.message)}</div>
              ${targetTag}${clientTag}${bountyTag}
            </div>`;
          main.querySelector('#ret-attacker-id').value   = '';
          main.querySelector('#ret-attacker-name').value = '';
          main.querySelector('#ret-victim-name').value   = '';
          await loadBounties();
          setTimeout(() => renderDashboard(main), 2000);
        } else {
          msgEl.innerHTML = `
            <div style="background:rgba(20,30,40,0.6);border:1px solid var(--border);padding:14px;margin-bottom:12px;border-radius:2px;">
              <div style="font-family:Share Tech Mono,monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px;">NOT IN RECORDS</div>
              <div style="font-size:13px;color:var(--dim);">${esc(attackerName)} [${esc(attackerId)}] is not a known client or past target. No auto-bounty posted.</div>
            </div>`;
        }
      } catch(e) {
        msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
      }

      btn.disabled = false;
      btn.textContent = '⚠ Check & Auto-Post Bounty if Known';
    });

    // Wire blacklist add
    main.querySelector('#bl-add').addEventListener('click', async () => {
      const id     = main.querySelector('#bl-id').value.trim();
      const reason = main.querySelector('#bl-reason').value.trim();
      const msgEl  = main.querySelector('#bl-msg');
      if (!id) { msgEl.innerHTML = '<div class="msg-error">Enter a Torn ID.</div>'; return; }
      try {
        await api('/admin/blacklist', { tornId: id, reason, action: 'add' });
        msgEl.innerHTML = '<div class="msg-success">Added to blacklist.</div>';
        main.querySelector('#bl-id').value = '';
        main.querySelector('#bl-reason').value = '';
        await renderDashboard(main);
      } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

    // Wire ban add
    main.querySelector('#ban-add').addEventListener('click', async () => {
      const id     = main.querySelector('#ban-id').value.trim();
      const name   = main.querySelector('#ban-name').value.trim();
      const reason = main.querySelector('#ban-reason').value.trim();
      const msgEl  = main.querySelector('#ban-msg');
      if (!id || !name) { msgEl.innerHTML = '<div class="msg-error">Torn ID and Name are required.</div>'; return; }
      if (!reason) { msgEl.innerHTML = '<div class="msg-error">A reason is required.</div>'; return; }
      try {
        await api('/admin/ban', { targetTornId: id, targetName: name, reason, action: 'ban' });
        msgEl.innerHTML = `<div class="msg-success">⛔ ${esc(name)} [${esc(id)}] has been banned and removed from all roles.</div>`;
        main.querySelector('#ban-id').value     = '';
        main.querySelector('#ban-name').value   = '';
        main.querySelector('#ban-reason').value = '';
        setTimeout(() => renderDashboard(main), 1500);
      } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

    // Wire unban buttons
    main.querySelectorAll('[data-action="unban"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        if (!confirm(`Unban this member? They will need to be re-added to a role manually.`)) return;
        try {
          await api('/admin/ban', { targetTornId: id, targetName: '', reason: '', action: 'unban' });
          await renderDashboard(main);
        } catch(e) { alert(e.message); }
      }));

    // Wire blacklist remove
    main.querySelectorAll('[data-action="unblacklist"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        try {
          await api('/admin/blacklist', { tornId: btn.dataset.id, action: 'remove' });
          await renderDashboard(main);
        } catch(e) {}
      }));

  } catch(e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── APPLICATIONS (admin only) ────────────────────────────────────────────
async function renderApplications(main) {
  main.innerHTML = `<div class="loading">Loading applications...</div>`;
  try {
    const res  = await api('/applications/list', { filter: 'pending' });
    const all  = await api('/applications/list', { filter: 'all' });
    const apps = res.applications || [];
    const past = (all.applications || []).filter(a => a.status !== 'pending');

    function appCard(a, showActions) {
      const time = new Date(a.submittedAt).toLocaleDateString();
      return `
        <div class="card" id="app-${a.id}" style="position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;right:0;height:2px;
                      background:linear-gradient(to right,transparent,${
                        a.status==='approved'?'var(--green)':a.status==='denied'?'var(--ember)':'var(--gold)'
                      },transparent);"></div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
            <div>
              <div style="font-family:Cinzel,serif;font-size:16px;color:var(--gold);margin-bottom:4px;">
                ${esc(a.tornUsername)}
                <a href="https://www.torn.com/profiles.php?XID=${esc(a.tornId)}" target="_blank"
                   style="font-family:Share Tech Mono,monospace;font-size:10px;color:var(--dim);margin-left:8px;">[${esc(a.tornId)} ↗]</a>
              </div>
              <div style="font-family:Share Tech Mono,monospace;font-size:10px;color:var(--dim);letter-spacing:1px;">
                ${esc(a.timezone||'Timezone not provided')} · Applied ${time}
              </div>
            </div>
            <span class="badge badge-${a.status==='approved'?'completed':a.status==='denied'?'payment_pending':'listed'}"
              style="align-self:flex-start;">
              ${a.status.toUpperCase()}
            </span>
          </div>
          <div style="margin-bottom:10px;">
            <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;">Combat Experience</div>
            <div style="font-size:14px;color:var(--text);line-height:1.6;">${esc(a.experience)}</div>
          </div>
          <div style="margin-bottom:${showActions?'14px':'0'};">
            <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;">Why Blacklist Recon</div>
            <div style="font-size:14px;color:var(--text);line-height:1.6;">${esc(a.whyJoin)}</div>
          </div>
          ${a.refCode ? `<div style="font-family:Share Tech Mono,monospace;font-size:10px;color:var(--dim);margin-bottom:10px;">Referral code: <span style="color:var(--gold);">${esc(a.refCode)}</span></div>` : ''}
          ${a.denialReason ? `<div style="font-size:12px;color:var(--ember);margin-bottom:10px;">Denied: ${esc(a.denialReason)}</div>` : ''}
          ${showActions ? `
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-green" data-action="approve-app" data-id="${a.id}" style="flex:1;">
                ✓ Approve — Add as Hunter
              </button>
              <button class="btn btn-red" data-action="deny-app" data-id="${a.id}" style="flex:1;">
                ✕ Deny
              </button>
            </div>
            <div class="app-msg" data-id="${a.id}"></div>
          ` : ''}
        </div>`;
    }

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Admin · Blacklist Recon</div>
        <div class="page-title">📋 Applications</div>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-value" style="font-size:32px;color:var(--gold);">${apps.length}</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="font-size:32px;color:var(--green);">${past.filter(a=>a.status==='approved').length}</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="font-size:32px;color:var(--ember);">${past.filter(a=>a.status==='denied').length}</div>
          <div class="stat-label">Denied</div>
        </div>
      </div>

      <div class="section-head">Pending Review (${apps.length})</div>
      ${apps.length === 0
        ? '<div class="empty">No pending applications</div>'
        : apps.map(a => appCard(a, true)).join('')}

      ${past.length > 0 ? `
        <div class="section-head" style="margin-top:24px;">Past Applications</div>
        ${past.slice(0,20).map(a => appCard(a, false)).join('')}
      ` : ''}
    `;

    // Wire approve/deny buttons
    main.querySelectorAll('[data-action="approve-app"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id    = btn.dataset.id;
        const msgEl = main.querySelector(`.app-msg[data-id="${id}"]`);
        btn.disabled = true;
        try {
          await api('/applications/review', { applicationId: id, action: 'approve' });
          const card = main.querySelector(`#app-${id}`);
          if (card) {
            card.style.opacity = '0.5';
            card.innerHTML = `<div style="padding:20px;text-align:center;font-family:Share Tech Mono,monospace;font-size:12px;color:var(--green);letter-spacing:2px;">
              ✓ APPROVED — Added to hunter roster. Welcome message posted in chat.
            </div>`;
          }
          // Refresh after short delay to update counts
          setTimeout(() => renderApplications(main), 1500);
        } catch(e) {
          if(msgEl) msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
          btn.disabled = false;
        }
      }));

    main.querySelectorAll('[data-action="deny-app"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id     = btn.dataset.id;
        const msgEl  = main.querySelector(`.app-msg[data-id="${id}"]`);
        const reason = prompt('Denial reason (optional — not shown to applicant):') ?? '';
        btn.disabled = true;
        try {
          await api('/applications/review', { applicationId: id, action: 'deny', denialReason: reason });
          const card = main.querySelector(`#app-${id}`);
          if (card) {
            card.style.opacity = '0.5';
            card.innerHTML = `<div style="padding:20px;text-align:center;font-family:Share Tech Mono,monospace;font-size:12px;color:var(--ember);letter-spacing:2px;">
              ✕ DENIED — Application archived.
            </div>`;
          }
          setTimeout(() => renderApplications(main), 1500);
        } catch(e) {
          if(msgEl) msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
          btn.disabled = false;
        }
      }));

  } catch(e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── AI CONTRACT ASSISTANT ────────────────────────────────────────────────
async function renderAI(main) {
  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon · Command Intelligence</div>
      <div class="page-title">🤖 AI Ops Assistant</div>
    </div>
    <p style="font-size:14px;color:var(--dim);line-height:1.7;margin-bottom:24px;">
      Describe any situation in plain English. The Assistant analyzes it using your live contract data,
      hunter availability, and Blacklist Recon's pricing structure to give you actionable recommendations.
    </p>

    <div class="card" style="margin-bottom:20px;">
      <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;">Quick Prompts</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${[
          "Recommend a contract tier for a high-level enemy faction leader",
          "How should I price a Ranked War Support campaign for 15 members?",
          "Which of my hunters should I assign a Tier III contract to right now?",
          "Draft a response to a client asking about war support pricing",
          "Analyze my current board and suggest priority actions",
          "What challenges are my hunters close to completing?",
        ].map(q => `
          <button class="btn ai-quick" style="font-size:11px;padding:4px 10px;" data-prompt="${esc(q)}">${esc(q)}</button>
        `).join('')}
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <textarea id="ai-input" rows="4"
        placeholder="Describe a situation, ask for pricing advice, draft a client reply, analyze a contract..."
        style="width:100%;resize:vertical;"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:10px;">
        <button class="btn btn-red" id="ai-submit" style="padding:8px 24px;">Ask AI Assistant →</button>
      </div>
    </div>

    <div id="ai-response" style="display:none;">
      <div class="section-head">Response</div>
      <div class="card">
        <div id="ai-response-text" style="font-size:14px;color:var(--text);line-height:1.8;white-space:pre-wrap;"></div>
      </div>
    </div>
    <div id="ai-loading" style="display:none;text-align:center;padding:32px;font-family:Share Tech Mono,monospace;font-size:11px;letter-spacing:2px;color:var(--dim);">
      ☠ PROCESSING INTELLIGENCE...
    </div>
    <div id="ai-error" style="display:none;"></div>
  `;

  async function buildContext() {
    try {
      const [board, balances, av, analytics] = await Promise.all([
        api('/bounties/list').catch(()=>({bounties:[]})),
        api('/balance/all').catch(()=>({memberBalances:{}, factionPool:{total:0}})),
        api('/hunter/availability/get').catch(()=>({availability:{}})),
        api('/admin/analytics').catch(()=>({tierStats:{}, topHunters:[]})),
      ]);

      const bounties   = board.bounties || [];
      const listed     = bounties.filter(b=>b.status==='listed').length;
      const claimed    = bounties.filter(b=>b.status==='claimed').length;
      const pending    = bounties.filter(b=>b.status==='pending_verification').length;
      const pool       = balances.factionPool?.total || 0;
      const avMap      = av.availability || {};
      const activeHunters = Object.values(avMap).filter(h=>h.status==='active').length;
      const totalMembers  = Object.keys(avMap).length;

      return `BLACKLIST RECON — LIVE OPERATIONAL CONTEXT

BOARD STATUS:
- Listed (open): ${listed}
- Claimed (in progress): ${claimed}
- Pending verification: ${pending}

FACTION POOL: $${pool.toLocaleString()}

HUNTER NETWORK:
- Total tracked members: ${totalMembers}
- Currently active: ${activeHunters}
- Active hunters: ${Object.entries(avMap).filter(([_,h])=>h.status==='active').map(([_,h])=>h.alias||h.name).join(', ')||'None'}

CONTRACT TIERS:
- Tier I Standard Hit: $1,000,000 fixed
- Tier II War Support: $3.5M-$5M
- Tier III High-Value: $3M+ negotiated
- Tier IV Ranked War Support (Protection): Custom arrangement

PAYOUT SPLIT: 75% hunter / 25% board (80/20 for referred clients first contract)
RANK SYSTEM: Ghost(0) → Blade(3) → Phantom(10) → Reaper(25) → Wraith(50) → Shadow Hand(100)`;
    } catch(e) {
      return "Live data unavailable — answering based on Blacklist Recon operational knowledge.";
    }
  }

  async function askAI(prompt) {
    const loadEl  = main.querySelector('#ai-loading');
    const respEl  = main.querySelector('#ai-response');
    const textEl  = main.querySelector('#ai-response-text');
    const errEl   = main.querySelector('#ai-error');
    const submitBtn = main.querySelector('#ai-submit');

    loadEl.style.display  = 'block';
    respEl.style.display  = 'none';
    errEl.style.display   = 'none';
    submitBtn.disabled    = true;

    try {
      const context = await buildContext();
      const systemPrompt = `You are the AI Ops Assistant for Blacklist Recon, an elite bounty hunting service in the browser game Torn City. You are speaking directly to The Handler (the admin/operator).

You have deep knowledge of:
- The Blacklist Recon contract system, pricing tiers, and operational structure
- Torn City game mechanics (attacks, hospital, jail, faction wars, ranked wars)
- The hunter rank system, challenge rewards, and referral network
- Client anonymity protocols and the code of silence

Your role is to:
- Recommend contract tiers and pricing strategies
- Draft professional client communications
- Analyze operational situations and suggest actions
- Advise on hunter assignments and campaign planning
- Help interpret live board data

Always be direct, professional, and tactical. Use the code of silence tone — precise, no fluff, no questions asked. When recommending prices, use the established tier structure. When drafting messages, match the Blacklist Recon brand voice: silent, professional, untraceable.

CURRENT LIVE OPERATIONAL DATA:
${context}`;

      // Route through Worker proxy — Anthropic key never touches the browser
      const res = await fetch(`${WORKER_URL}/ai/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          apiKey,
          system:   systemPrompt,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "AI request failed.");

      const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n');
      textEl.textContent   = text;
      respEl.style.display = 'block';
    } catch(e) {
      errEl.innerHTML      = `<div class="msg-error">AI error: ${esc(e.message)}</div>`;
      errEl.style.display  = 'block';
    }

    loadEl.style.display = 'none';
    submitBtn.disabled   = false;
  }

  main.querySelector('#ai-submit').addEventListener('click', () => {
    const prompt = main.querySelector('#ai-input').value.trim();
    if (!prompt) return;
    askAI(prompt);
  });

  main.querySelector('#ai-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) {
      const prompt = main.querySelector('#ai-input').value.trim();
      if (prompt) askAI(prompt);
    }
  });

  main.querySelectorAll('.ai-quick').forEach(btn =>
    btn.addEventListener('click', () => {
      main.querySelector('#ai-input').value = btn.dataset.prompt;
      askAI(btn.dataset.prompt);
    }));
}

// ── CHALLENGES ────────────────────────────────────────────────────────────
async function renderChallenges(main) {

        ${pending.map(t => reviewCard(t, true)).join('')}

      ${approved.length > 0 ? `
        <div class="section-head">Approved & Live</div>
        ${approved.map(t => reviewCard(t, false)).join('')}

// ── ROSTER (admin only) ───────────────────────────────────────────────────
async function renderRoster(main) {
  main.innerHTML = `<div class="loading">Loading roster...</div>`;
  try {
    const res  = await api('/agent-map');
    const roster = res.roster || {};
    // Load rank data
    let memberRanks = {};
    try {
      const allBal = await api('/balance/all');
      memberRanks = allBal.memberRanks || {};
    } catch(e) {}

    // Get role assignments for each member
    let allRoles = {};
    try {
      const rolesRes = await api('/roles/list');
      allRoles = rolesRes.roles || {};
    } catch(e) {}

    function getMemberRole(tornId) {
      for (const r of ['admin','lister','verifier','hunter']) {
        if ((allRoles[r]||[]).includes(String(tornId))) return r;
      }
      return null;
    }

    const rows = Object.entries(roster).length === 0
      ? `<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:20px;">No agents yet</td></tr>`
      : Object.entries(roster).sort((a,b) => a[1].agentNumber - b[1].agentNumber).map(([tornId, r]) => {
          const memberRole = getMemberRole(tornId);
          const isHunter   = memberRole === 'hunter';
          const ri         = memberRanks[tornId];

          // Hunters show rank badge + contract count
          // Staff show role badge + dash for contracts
          let badge, contracts;
          if (isHunter) {
            badge     = ri ? rankBadge(ri.rank.id, ri.rank.name, ri.onProbation) : rankBadge('ghost', 'Ghost', false);
            contracts = ri ? ri.completed : 0;
          } else {
            badge     = roleBadge(memberRole || 'lister');
            contracts = ri ? ri.completed : 0;
          }

          return `<tr>
            <td style="color:var(--ember);">Agent #${r.agentNumber}</td>
            <td style="color:var(--gold);">${esc(r.alias)}</td>
            <td>${badge}</td>
            <td style="color:var(--dim);font-family:Share Tech Mono,monospace;font-size:11px;">${contracts}</td>
            <td><a href="https://www.torn.com/profiles.php?XID=${tornId}" target="_blank" style="color:var(--dim);font-size:10px;">${tornId} ↗</a></td>
          </tr>`;
        }).join('');

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Admin · Blacklist Recon</div>
        <div class="page-title">👥 Agent Roster</div>
      </div>
      <div class="section-head">Active Agents</div>
      <table class="roster-table">
        <thead><tr><th>Agent</th><th>Alias</th><th>Rank</th><th>Contracts</th><th>Torn ID</th>${identity.role === 'admin' ? '<th>Set Rank</th>' : ''}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

    main.querySelectorAll('[data-action="lift-probation"]').forEach(btn =>
