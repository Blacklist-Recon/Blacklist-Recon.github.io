        const id    = btn.dataset.id;
        const msgEl = main.querySelector(`.pay-msg[data-id="${id}"]`);
        btn.disabled = true;
        try {
          await api('/rank/override-probation', { targetTornId: id });
          msgEl.innerHTML = `<div class="msg-success">Probation lifted.</div>`;
          await renderAdmin(main);
        } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="pay"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const id    = btn.dataset.id;
        const msgEl = main.querySelector(`.pay-msg[data-id="${id}"]`);
        btn.disabled = true;
        try {
          await api('/balance/approve-withdrawal', { targetTornId: id });
          msgEl.innerHTML = `<div class="msg-success">Marked as paid.</div>`;
          await renderAdmin(main);
        } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    // Wire auto monitoring registration
    const scanRegBtn = main.querySelector('#scan-register-btn');
    if (scanRegBtn) {
      scanRegBtn.addEventListener('click', async () => {
        const msgEl = main.querySelector('#scan-reg-msg');
        scanRegBtn.disabled    = true;
        scanRegBtn.textContent = 'Registering...';
        try {
          const res = await api('/attacks/register-scan-key');
          msgEl.innerHTML        = `<div class="msg-success">✓ ${res.message}</div>`;
          scanRegBtn.textContent = '✓ Auto Monitoring Active';
          scanRegBtn.style.background = 'var(--green)';
        } catch(e) {
          msgEl.innerHTML        = `<div class="msg-error">${esc(e.message)}</div>`;
          scanRegBtn.disabled    = false;
          scanRegBtn.textContent = '🔍 Enable Auto Monitoring for My Account';
        }
      });
    }

        try {
      const aliasRes = await api('/alias/get');
      const aliasInput = main.querySelector('#alias-input');
      if (aliasInput && aliasRes.alias) aliasInput.value = aliasRes.alias;
    } catch(e) {}

    const aliasSaveBtn = main.querySelector('#alias-save-btn');
    if (aliasSaveBtn) {
      aliasSaveBtn.addEventListener('click', async () => {
        const alias = main.querySelector('#alias-input').value.trim();
        const msgEl = main.querySelector('#alias-msg');
        if (!alias) { msgEl.innerHTML = '<div class="msg-error">Enter an alias.</div>'; return; }
        aliasSaveBtn.disabled = true;
        try {
          await api('/alias/set', { alias });
          msgEl.innerHTML = '<div class="msg-success">Alias saved! You now appear as ' + esc(alias) + ' to others.</div>';
        } catch(e) { msgEl.innerHTML = '<div class="msg-error">' + esc(e.message) + '</div>'; }
        aliasSaveBtn.disabled = false;
      });
    }

    main.querySelectorAll('[data-act]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const tornId = main.querySelector('#role-id').value.trim();
        const role   = main.querySelector('#role-sel').value;
        const msgEl  = main.querySelector('#role-msg');
        if (!tornId) { msgEl.innerHTML = `<div class="msg-error">Enter a Torn ID.</div>`; return; }
        btn.disabled = true;
        try {
          await api('/roles/set', { targetTornId: tornId, role, action: btn.dataset.act });
          msgEl.innerHTML = `<div class="msg-success">Role updated.</div>`;
          await renderAdmin(main);
        } catch (e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    // Reset balance buttons
    const resetMsg = main.querySelector('#reset-msg');
    main.querySelector('#reset-one-btn').addEventListener('click', async () => {
      const tornId = main.querySelector('#reset-id').value.trim();
      if (!tornId) { resetMsg.innerHTML = `<div class="msg-error">Enter a Torn ID to reset a single player.</div>`; return; }
      if (!confirm(`Reset balance for ${tornId}? This cannot be undone.`)) return;
      try {
        await api('/balance/reset', { targetTornId: tornId });
        resetMsg.innerHTML = `<div class="msg-success">Balance reset for ${tornId}.</div>`;
        await renderAdmin(main);
      } catch(e) { resetMsg.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

    main.querySelector('#reset-all-btn').addEventListener('click', async () => {
      if (!confirm('Reset ALL member balances and faction pool? This cannot be undone.')) return;
      if (!confirm('Are you sure? This will wipe every balance including the faction pool.')) return;
      try {
        await api('/balance/reset', {});
        resetMsg.innerHTML = `<div class="msg-success">All balances and faction pool have been reset.</div>`;
        await renderAdmin(main);
      } catch(e) { resetMsg.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
    });

  } catch (e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── CAMPAIGNS ────────────────────────────────────────────────────────────
async function renderCampaigns(main) {
  main.innerHTML = `<div class="loading">Loading campaigns...</div>`;
  try {
    const res       = await api('/campaigns/list');
    const campaigns = res.campaigns || [];

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Blacklist Recon</div>
        <div class="page-title">⚔️ Ranked War Support</div>
      </div>

      <div class="section-head">Launch New Campaign</div>
      <div id="campaign-msg"></div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">Total Campaign Price ($ millions)</label>
          <input id="camp-price" type="number" min="1" step="0.5" placeholder="e.g. 10 for $10M total" />
          <div class="form-hint">Price is divided evenly across all targets</div>
        </div>
        <div class="form-group">
          <label class="form-label">Members to Protect — one per line (Name,XID optional)</label>
          <textarea id="camp-targets" rows="6" placeholder="InactiveMember1,1234567&#10;LowLevelMember2,2345678&#10;InactiveMember3"></textarea>
          <div class="form-hint">Your own faction members to keep hospitalized. Format: Name,TornID — TornID optional but recommended</div>
        </div>
        <div class="form-group">
          <label class="form-label">Campaign Notes</label>
          <input id="camp-notes" type="text" placeholder="e.g. Ranked war vs Faction X — protect our inactives and low levels" />
        </div>
        <button class="btn btn-red" id="camp-submit" style="width:100%;padding:12px;">
          ⚔️ Launch Campaign →
        </button>
      </div>

      <div class="section-head">Active Campaigns</div>
      ${campaigns.length === 0
        ? `<div class="empty">No campaigns yet</div>`
        : campaigns.map(c => `
          <div class="card">
            <div class="card-row">
              <span class="card-label">Campaign ID</span>
              <span class="card-value" style="font-size:10px;color:var(--dim);">${c.id.slice(0,8)}...</span>
            </div>
            <div class="card-row">
              <span class="card-label">Targets</span>
              <span class="card-value" style="color:var(--ember);">${c.targetCount} targets</span>
            </div>
            <div class="card-row">
              <span class="card-label">Total Price</span>
              <span class="card-value" style="color:var(--green);">${fmt(c.totalPrice * 1000000)}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Per Target</span>
              <span class="card-value">${fmt(c.pricePerBounty * 1000000)}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Status</span>
              <span class="badge badge-${c.status === 'active' ? 'listed' : 'completed'}">${c.status}</span>
            </div>
            <div class="card-row">
              <span class="card-label">Created</span>
              <span class="card-value" style="color:var(--dim);">${new Date(c.createdAt).toLocaleDateString()}</span>
            </div>
            ${c.notes ? `<div class="card-row"><span class="card-label">Notes</span><span class="card-value">${esc(c.notes)}</span></div>` : ''}
          </div>
        `).join('')}
    `;

    main.querySelector('#camp-submit').addEventListener('click', async () => {
      const price   = parseFloat(main.querySelector('#camp-price').value);
      const rawText = main.querySelector('#camp-targets').value.trim();
      const notes   = main.querySelector('#camp-notes').value.trim();
      const msgEl   = main.querySelector('#campaign-msg');

      if (!price || price <= 0) { msgEl.innerHTML = `<div class="msg-error">Enter a total price.</div>`; return; }
      if (!rawText) { msgEl.innerHTML = `<div class="msg-error">Enter at least one target.</div>`; return; }

      // Parse targets — one per line, Name,XID format
      const targets = rawText.split('\n').map(line => {
        const parts = line.trim().split(',');
        return { name: parts[0]?.trim(), xid: parts[1]?.trim() || null };
      }).filter(t => t.name);

      if (targets.length === 0) { msgEl.innerHTML = `<div class="msg-error">No valid targets found.</div>`; return; }

      const btn = main.querySelector('#camp-submit');
      btn.disabled = true;
      try {
        const res = await api('/campaigns/create', { targets, totalPrice: price, notes });
        msgEl.innerHTML = `<div class="msg-success">
          ⚔️ Protection campaign launched! ${res.bountyCount} members queued for protection at ${fmt(res.pricePerBounty * 1000000)} each.
        </div>`;
        main.querySelector('#camp-price').value   = '';
        main.querySelector('#camp-targets').value = '';
        main.querySelector('#camp-notes').value   = '';
        await loadBounties();
        setTimeout(() => renderCampaigns(main), 1500);
      } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; }
      btn.disabled = false;
    });

  } catch(e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── MESSAGES ─────────────────────────────────────────────────────────────
async function renderMessages(main) {
  main.innerHTML = `<div class="loading">Loading messages...</div>`;
  try {
    const res      = await api('/messages/list');
    const messages = res.messages || [];

    const cards = messages.length === 0
      ? `<div class="empty">No messages yet</div>`
      : messages.map(m => {
          const time = new Date(m.timestamp).toLocaleString();
          return `
            <div class="inbox-card ${m.read ? 'read' : 'unread'}" id="imsg-${m.id}">
              <div class="inbox-subject">${esc(m.subject || 'No subject')}</div>
              <div class="inbox-meta">${time} ${!m.read ? '· <span style="color:var(--ember);">UNREAD</span>' : ''}</div>
              <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:rgba(139,26,26,0.1);border:1px solid var(--border);">
                <div>
                  <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:2px;">Torn Username</div>
                  <div style="font-family:Share Tech Mono,monospace;font-size:13px;color:var(--gold);">${esc(m.tornUsername || '—')}</div>
                </div>
                <div>
                  <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:2px;">Torn ID</div>
                  <div style="font-family:Share Tech Mono,monospace;font-size:13px;color:var(--gold);">
                    ${m.tornId ? `<a href="https://www.torn.com/profiles.php?XID=${esc(m.tornId)}" target="_blank" style="color:var(--gold);text-decoration:none;">${esc(m.tornId)} ↗</a>` : '—'}
                  </div>
                </div>
                ${m.tornId ? `
                <div>
                  <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:2px;">Send Message</div>
                  <a href="https://www.torn.com/messages.php#/p=compose&XID=${esc(m.tornId)}" target="_blank"
                    style="font-family:Share Tech Mono,monospace;font-size:11px;color:var(--ember);text-decoration:none;">Message in Torn ↗</a>
                </div>` : ''}
              </div>
              ${m.contactHint ? `<div class="inbox-hint">📡 ${esc(m.contactHint)}</div>` : ''}
              <div class="inbox-message">${esc(m.message)}</div>
              ${m.notes ? `<div class="inbox-note">📝 Note: ${esc(m.notes)}</div>` : ''}
              <div class="btn-row">
                ${!m.read ? `<button class="btn btn-green" data-action="mark-read" data-id="${m.id}">Mark Read</button>` : ''}
                <button class="btn" data-action="add-note" data-id="${m.id}">📝 Add Note</button>
                <button class="btn" style="color:var(--dim);" data-action="delete-msg" data-id="${m.id}">🗑 Delete</button>
              </div>
              <div class="note-form" data-id="${m.id}" style="display:none;margin-top:10px;">
                <input type="text" class="note-input" data-id="${m.id}" placeholder="Add a private note..." maxlength="500"
                  style="width:100%;margin-bottom:6px;" value="${esc(m.notes||'')}" />
                <button class="btn btn-red" data-action="save-note" data-id="${m.id}">Save Note</button>
              </div>
              <div class="msg-feedback" data-id="${m.id}"></div>
            </div>
          `;
        }).join('');

    main.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Blacklist Recon</div>
        <div class="page-title">📨 Inbox <span style="font-size:14px;color:var(--dim);">(${messages.filter(m=>!m.read).length} unread)</span></div>
      </div>
      ${cards}
    `;

    // Wire buttons
    main.querySelectorAll('[data-action="mark-read"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try {
          await api('/messages/read', { messageId: btn.dataset.id });
          await renderMessages(main);
        } catch(e) { btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="add-note"]').forEach(btn =>
      btn.addEventListener('click', () => {
        const form = main.querySelector(`.note-form[data-id="${btn.dataset.id}"]`);
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
      }));

    main.querySelectorAll('[data-action="save-note"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const note  = main.querySelector(`.note-input[data-id="${btn.dataset.id}"]`).value.trim();
        const msgEl = main.querySelector(`.msg-feedback[data-id="${btn.dataset.id}"]`);
        btn.disabled = true;
        try {
          await api('/messages/note', { messageId: btn.dataset.id, note });
          msgEl.innerHTML = `<div class="msg-success" style="margin-top:6px;">Note saved.</div>`;
          await renderMessages(main);
        } catch(e) { msgEl.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`; btn.disabled = false; }
      }));

    main.querySelectorAll('[data-action="delete-msg"]').forEach(btn =>
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this message?')) return;
        btn.disabled = true;
        try {
          await api('/messages/delete', { messageId: btn.dataset.id });
          await renderMessages(main);
        } catch(e) { btn.disabled = false; }
      }));

  } catch(e) {
    main.innerHTML = `<div class="msg-error">${esc(e.message)}</div>`;
  }
}

// ── CHAT ──────────────────────────────────────────────────────────────────
let chatPollInterval = null;
let lastMessageTime  = 0;
let myDisplayName    = null;

async function getMyDisplayName() {
  if (myDisplayName) return myDisplayName;
  try {
    const res = await api('/alias/get');
    const agentRes = await api('/balance/get');
    myDisplayName = res.alias || (agentRes.agentNumber ? `Agent #${agentRes.agentNumber}` : identity.name);
  } catch(e) {
    myDisplayName = identity.name;
  }
  return myDisplayName;
}

async function renderChat(main) {
  const displayName = await getMyDisplayName();

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Blacklist Recon</div>
      <div class="page-title">💬 Ops Channel</div>
    </div>
    <div class="chat-window">
      <div class="chat-messages" id="chat-msgs"><div class="chat-empty">Loading messages...</div></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message... (500 chars max)" maxlength="500" />
        <button class="btn btn-red" id="chat-send">Send</button>
      </div>
    </div>
  `;

  async function loadMessages(initial = false) {
    try {
      const res      = await api('/chat/messages', { since: initial ? 0 : lastMessageTime });
      const msgsEl   = main.querySelector('#chat-msgs');
      if (!msgsEl) return;
      const msgs     = res.messages || [];
      if (msgs.length === 0 && initial) {
        msgsEl.innerHTML = '<div class="chat-empty">No messages yet. Say something.</div>';
        return;
      }
      if (msgs.length > 0) {
        lastMessageTime = Math.max(...msgs.map(m => m.timestamp));
        if (initial) msgsEl.innerHTML = '';
        msgs.forEach(m => {
          const isMine    = m.sender === displayName;
          const isAdmin   = m.role === 'admin';
          const time      = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          const div       = document.createElement('div');
          div.className   = `chat-msg ${isMine ? 'mine' : 'theirs'} ${isAdmin ? 'admin-msg' : ''}`;
          div.dataset.id  = m.id;
          div.innerHTML   = `
            <div class="chat-meta">
              <span class="chat-sender">${esc(m.sender)}</span> · ${time}
              ${identity.role === 'admin' && !isMine ? `<button onclick="deleteMsg('${m.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;margin-left:6px;">✕</button>` : ''}
              <button class="xlate-btn" data-text="${esc(m.message)}"
                style="background:none;border:none;cursor:pointer;font-family:Share Tech Mono,monospace;
                       font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;
                       padding:0 4px;margin-left:4px;transition:color 0.15s;"
                title="Translate">⟳</button>
            </div>
            <div class="chat-bubble">${esc(m.message)}</div>
            <div class="chat-xlate" style="display:none;font-size:11px;color:var(--dim);font-style:italic;
                  border-top:1px solid var(--border);margin-top:4px;padding-top:4px;padding:4px 8px;"></div>
          `;
          // Wire translate button
          const xlateBtn = div.querySelector('.xlate-btn');
          const xlateEl  = div.querySelector('.chat-xlate');
          xlateBtn.addEventListener('click', async () => {
            if (xlateEl.style.display === 'block') {
              xlateEl.style.display = 'none';
              xlateBtn.textContent  = '⟳';
              xlateBtn.style.color  = 'var(--muted)';
              return;
            }
            if (xlateEl.dataset.done === '1') {
              xlateEl.style.display = 'block';
              xlateBtn.textContent  = '✕';
              xlateBtn.style.color  = 'var(--ember)';
              return;
            }
            xlateBtn.textContent = '...';
            xlateBtn.disabled    = true;
            try {
              const lang = (navigator.language || 'en').split('-')[0];
              const res  = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(xlateBtn.dataset.text)}&langpair=auto|${lang}`);
              const data = await res.json();
              const tx   = data?.responseData?.translatedText;
              xlateEl.innerHTML    = tx && tx !== xlateBtn.dataset.text
                ? `<span style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px;">Translated</span>${esc(tx)}`
                : '<span style="font-size:9px;color:var(--muted);">Already in your language</span>';
              xlateEl.dataset.done = '1';
              xlateEl.style.display = 'block';
              xlateBtn.textContent  = '✕';
              xlateBtn.style.color  = 'var(--ember)';
            } catch(e) {
              xlateEl.textContent   = 'Translation unavailable.';
              xlateEl.style.display = 'block';
              xlateBtn.textContent  = '⟳';
            }
            xlateBtn.disabled = false;
          });
          msgsEl.appendChild(div);
        });
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }
    } catch(e) {}
  }

  window.deleteMsg = async (id) => {
    try {
      await api('/chat/delete', { messageId: id });
      const el = main.querySelector(`[data-id="${id}"]`);
      if (el) el.remove();
    } catch(e) {}
  };

  await loadMessages(true);

  // Poll every 5 seconds
  if (chatPollInterval) clearInterval(chatPollInterval);
  chatPollInterval = setInterval(() => {
    if (currentPage === 'chat') loadMessages(false);
    else clearInterval(chatPollInterval);
  }, 5000);

  const sendBtn   = main.querySelector('#chat-send');
  const chatInput = main.querySelector('#chat-input');

  async function sendMessage() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    sendBtn.disabled = true;
    chatInput.value  = '';
    try {
      await api('/chat/send', { message: msg });
      await loadMessages(false);
    } catch(e) {
      chatInput.value = msg;
    }
    sendBtn.disabled = false;
    chatInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  chatInput.focus();
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('api-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logout-btn').addEventListener('click', logout);

// Auto-login if key saved
if (apiKey) {
  (async () => {
    try {
      const res = await api('/whoami');
      identity = { tornId: res.tornId, name: res.name, role: res.role };
      await loadBounties();
      showApp();
    } catch (e) {
      localStorage.removeItem('blhq_api_key');
      apiKey = '';
    }
  })();
}
